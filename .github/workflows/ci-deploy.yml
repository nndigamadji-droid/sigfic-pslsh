name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sigfic-pslsh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy frontend to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          : "${NETLIFY_AUTH_TOKEN:?NETLIFY_AUTH_TOKEN is required}"
          : "${NETLIFY_SITE_ID:?NETLIFY_SITE_ID is required}"

          cd frontend
          zip -qr ../frontend.zip .
          cd ..

          response="$(curl -fsS \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @frontend.zip \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys")"
          deploy_id="$(node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).id));" <<< "${response}")"

          for attempt in $(seq 1 60); do
            status_json="$(curl -fsS \
              -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
              "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys/${deploy_id}")"
            state="$(node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).state));" <<< "${status_json}")"
            echo "Netlify deploy state: ${state}"
            if [ "${state}" = "ready" ]; then
              exit 0
            fi
            if [ "${state}" = "error" ]; then
              echo "Netlify deploy failed" >&2
              exit 1
            fi
            sleep 5
          done

          echo "Netlify deploy timed out" >&2
          exit 1

      - name: Trigger backend deploy on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_NAME: sigfic-pslsh-backend
        run: |
          set -euo pipefail
          : "${RENDER_API_KEY:?RENDER_API_KEY is required}"

          services_json="$(curl -fsS \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            "https://api.render.com/v1/services?limit=100")"
          resolved_service_id="$(node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const data=JSON.parse(s); const rows=Array.isArray(data)?data:(data.services||data.results||[]); const target=process.env.RENDER_SERVICE_NAME; const hit=rows.map((row)=>row.service||row).find((svc)=>svc&&svc.name===target); process.stdout.write(hit&&hit.id?hit.id:'');});" <<< "${services_json}")"
          service_id="${resolved_service_id:-${RENDER_SERVICE_ID:-}}"
          : "${service_id:?Render service introuvable. Verifiez RENDER_SERVICE_NAME ou RENDER_SERVICE_ID}"

          response="$(curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/${service_id}/deploys")"
          deploy_id="$(node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s); console.log(j.id || (j.deploy && j.deploy.id));});" <<< "${response}")"

          for attempt in $(seq 1 120); do
            status_json="$(curl -fsS \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${service_id}/deploys/${deploy_id}")"
            state="$(node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s); console.log(j.status || (j.deploy && j.deploy.status) || 'unknown');});" <<< "${status_json}")"
            echo "Render deploy state: ${state}"
            if [ "${state}" = "live" ]; then
              exit 0
            fi
            case "${state}" in
              build_failed|update_failed|canceled|failed|deactivated)
                echo "Render deploy failed with state: ${state}" >&2
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Render deploy timed out" >&2
          exit 1
