<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGFIC-PSLSH | Émettre un Ordre de Virement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../../src/css/main.css" rel="stylesheet">
  <style>
    html,body{height:100%;overflow:hidden}
    .app-layout,.main-content{height:100vh;overflow:hidden}
    .page-content{flex:1;overflow-y:auto;padding:20px 28px;background:#eef2f7}
    .em-hero{background:#fff;border:1px solid #e2e8f0;border-left:4px solid #15803d;border-radius:10px;
      padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
    .em-hero h5{margin:0;font-size:1rem;font-weight:800;color:#1b2f52}
    .em-hero small{font-size:.72rem;color:#64748b}
    .em-hero .em-tag{font-size:.66rem;font-weight:800;padding:5px 12px;border-radius:6px;
      background:#dcfce7;color:#15803d;text-transform:uppercase;letter-spacing:.04em}
    .em-form{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px 24px;max-width:980px}
    .em-form label{font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
    .em-form input,.em-form select,.em-form textarea{width:100%;font-size:.84rem;padding:8px 12px;
      border:1px solid #cbd5e1;border-radius:7px;background:#fff;color:#1b2f52;font-family:inherit}
    .em-form input:focus,.em-form select:focus,.em-form textarea:focus{outline:none;border-color:#15803d;box-shadow:0 0 0 3px #dcfce7}
    .em-form textarea{resize:vertical;min-height:80px}
    .em-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px}
    .em-grid .full{grid-column:1/-1}
    .em-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:1px solid #f1f5f9;margin-top:8px}
    .btn-em{font-size:.78rem;font-weight:700;padding:9px 18px;border-radius:8px;cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;border:1px solid}
    .btn-em.primary{background:#15803d;color:#fff;border-color:#15803d}
    .btn-em.primary:hover{filter:brightness(.92)}
    .btn-em.ghost{background:#fff;color:#64748b;border-color:#cbd5e1}
    .btn-em.ghost:hover{border-color:#1b3a6b;color:#1b3a6b}
    .em-alert{padding:10px 14px;border-radius:8px;font-size:.78rem;margin-bottom:12px;display:none}
    .em-alert.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
    .em-alert.err{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
    .em-alert.visible{display:block}
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/logo/logo-pslsh.png" alt="" class="brand-logo">
      <div class="brand-text"><div class="brand-name">SIGFIC-PSLSH</div><div class="brand-sub">Émissions</div></div>
    </div>
    <div id="sidebarServiceBadge"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="sf-version">SIGFIC-PSLSH v2.0</div></div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><nav><ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="/pages/dashboard/index.html" class="text-muted">Tableau de bord</a></li>
        <li class="breadcrumb-item active fw-semibold">Émettre un Ordre de Virement</li>
      </ol></nav></div>
      <div class="topbar-center"><i class="fas fa-money-check-alt me-1"></i>Ordre de Virement</div>
      <div class="topbar-right">
        <div class="topbar-notif"><i class="fas fa-bell"></i><span class="notif-dot"></span></div>
        <div class="dropdown">
          <button class="btn btn-sm btn-light dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--c-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700" id="userAvatar">?</div>
            <span id="userName" style="font-size:.82rem;font-weight:600"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/pages/admin/profile.html"><i class="fas fa-user me-2"></i>Mon profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="btnLogout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="em-hero">
        <div>
          <h5><i class="fas fa-money-check-alt me-2" style="color:#15803d"></i>Émettre un Ordre de Virement</h5>
          <small>Signature engageante du Comptable Principal — sera transmis au Coordonnateur pour ordonnancement.</small>
        </div>
        <span class="em-tag">OV — pécuniaire</span>
      </div>
      <div id="alert" class="em-alert"></div>
      
      <form class="em-form" id="ovForm" onsubmit="event.preventDefault();submitOv()">
        <div class="em-grid">
          <div><label>Dossier de référence</label><input type="text" name="dossier_ref" placeholder="DOS-2026-NNNN"></div>
          <div><label>Référence facture (optionnel)</label><input type="text" name="facture_ref" placeholder="FAC-…"></div>
          <div><label>Nom du bénéficiaire *</label><input type="text" name="beneficiaire_nom" required placeholder="Raison sociale ou nom complet"></div>
          <div><label>Banque du bénéficiaire</label><select name="beneficiaire_banque">
            <option value="">— Choisir —</option><option>CBT</option><option>Ecobank</option><option>UBA</option><option>BCC</option><option>SGT</option><option>Orabank</option>
          </select></div>
          <div class="full"><label>N° de compte / IBAN</label><input type="text" name="beneficiaire_compte" placeholder="TD12 3456 7890 1234 5678"></div>
          <div><label>Montant (FCFA) *</label><input type="number" name="montant" required min="1" step="1" placeholder="0"></div>
          <div><label>Devise</label><select name="devise"><option>FCFA</option><option>EUR</option><option>USD</option></select></div>
          <div><label>Ligne budgétaire</label><input type="text" name="ligne_budgetaire" placeholder="L-DF1-001"></div>
          <div><label>Date d'exécution prévue</label><input type="date" name="date_execution_prevue"></div>
          <div><label>Compte débit</label><input type="text" name="compte_debit" value="4011" placeholder="ex. 4011"></div>
          <div><label>Compte crédit</label><input type="text" name="compte_credit" value="5121" placeholder="ex. 5121"></div>
          <div class="full"><label>Objet *</label><textarea name="objet" required placeholder="Motif du virement, prestation rendue, période…"></textarea></div>
        </div>
        <div class="em-actions">
          <a href="/pages/dashboard/index.html" class="btn-em ghost"><i class="fas fa-times"></i>Annuler</a>
          <button type="submit" class="btn-em primary"><i class="fas fa-file-signature"></i>Émettre & signer l'OV</button>
        </div>
      </form>
  
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/api.js"></script>
<script src="/src/js/roles.js"></script>
<script>
const API = 'http://localhost:3000/api/v1';
const tok = () => localStorage.getItem('pslsh_token');
async function post(url, body) {{
  const r = await fetch(API+url, {{method:'POST', headers:{{'Content-Type':'application/json',Authorization:'Bearer '+tok()}}, body: JSON.stringify(body)}});
  return r.json();
}}
function showAlert(type, msg) {{
  const a = document.getElementById('alert');
  a.className = 'em-alert visible ' + type;
  a.innerHTML = msg;
  a.scrollIntoView({{behavior:'smooth'}});
}}

async function submitOv() {
  const f = document.getElementById('ovForm');
  const fd = new FormData(f); const body = {};
  for (const [k,v] of fd.entries()) body[k] = v;
  const r = await post('/emissions/ov', body);
  if (r.success) {
    showAlert('ok','✓ OV <strong>'+r.data.reference+'</strong> émis avec succès. Transmis au Coordonnateur pour ordonnancement.<br><a href="/pages/finances/ov-list.html" style="color:inherit;text-decoration:underline">Voir les OV en cours →</a>');
    f.reset();
  } else {
    showAlert('err','✗ ' + (r.message || 'Erreur lors de l\'émission'));
  }
}

</script>
</body></html>
