<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGFIC-PSLSH | Suivi des Ordres de Virement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../../src/css/main.css" rel="stylesheet">
  <style>
    html,body{height:100%;overflow:hidden}
    .app-layout,.main-content{height:100vh;overflow:hidden}
    .page-content{flex:1;overflow-y:auto;padding:20px 28px;background:#eef2f7}
    .em-hero{background:#fff;border:1px solid #e2e8f0;border-left:4px solid #1b3a6b;border-radius:10px;
      padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
    .em-hero h5{margin:0;font-size:1rem;font-weight:800;color:#1b2f52}
    .em-hero small{font-size:.72rem;color:#64748b}
    .em-hero .em-tag{font-size:.66rem;font-weight:800;padding:5px 12px;border-radius:6px;
      background:#e8f0fb;color:#1b3a6b;text-transform:uppercase;letter-spacing:.04em}
    .em-form{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px 24px;max-width:980px}
    .em-form label{font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
    .em-form input,.em-form select,.em-form textarea{width:100%;font-size:.84rem;padding:8px 12px;
      border:1px solid #cbd5e1;border-radius:7px;background:#fff;color:#1b2f52;font-family:inherit}
    .em-form input:focus,.em-form select:focus,.em-form textarea:focus{outline:none;border-color:#1b3a6b;box-shadow:0 0 0 3px #e8f0fb}
    .em-form textarea{resize:vertical;min-height:80px}
    .em-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px}
    .em-grid .full{grid-column:1/-1}
    .em-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:1px solid #f1f5f9;margin-top:8px}
    .btn-em{font-size:.78rem;font-weight:700;padding:9px 18px;border-radius:8px;cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;border:1px solid}
    .btn-em.primary{background:#1b3a6b;color:#fff;border-color:#1b3a6b}
    .btn-em.primary:hover{filter:brightness(.92)}
    .btn-em.ghost{background:#fff;color:#64748b;border-color:#cbd5e1}
    .btn-em.ghost:hover{border-color:#1b3a6b;color:#1b3a6b}
    .em-alert{padding:10px 14px;border-radius:8px;font-size:.78rem;margin-bottom:12px;display:none}
    .em-alert.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
    .em-alert.err{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
    .em-alert.visible{display:block}
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/logo/logo-pslsh.png" alt="" class="brand-logo">
      <div class="brand-text"><div class="brand-name">SIGFIC-PSLSH</div><div class="brand-sub">Émissions</div></div>
    </div>
    <div id="sidebarServiceBadge"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="sf-version">SIGFIC-PSLSH v2.0</div></div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><nav><ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="/pages/dashboard/index.html" class="text-muted">Tableau de bord</a></li>
        <li class="breadcrumb-item active fw-semibold">Suivi des Ordres de Virement</li>
      </ol></nav></div>
      <div class="topbar-center"><i class="fas fa-list-alt me-1"></i>Liste des OV</div>
      <div class="topbar-right">
        <div class="topbar-notif"><i class="fas fa-bell"></i><span class="notif-dot"></span></div>
        <div class="dropdown">
          <button class="btn btn-sm btn-light dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--c-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700" id="userAvatar">?</div>
            <span id="userName" style="font-size:.82rem;font-weight:600"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/pages/admin/profile.html"><i class="fas fa-user me-2"></i>Mon profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="btnLogout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="em-hero">
        <div>
          <h5><i class="fas fa-list-alt me-2" style="color:#1b3a6b"></i>Suivi des Ordres de Virement</h5>
          <small>Tous les OV émis — par statut. Le Coordonnateur peut ordonnancer ; le Comptable peut exécuter.</small>
        </div>
        <span class="em-tag">OV — suivi</span>
      </div>
      <div id="alert" class="em-alert"></div>
      
      <div style="margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap">
        <select id="fStatut" onchange="loadOv()" style="padding:6px 12px;border:1px solid #cbd5e1;border-radius:7px;font-size:.78rem">
          <option value="">Tous statuts</option>
          <option value="emis">Émis (en attente ordonnancement)</option>
          <option value="ordonnance">Ordonnancé (en attente exécution)</option>
          <option value="execute">Exécuté</option>
          <option value="rejete">Rejeté</option>
        </select>
        <a href="emit-ov.html" class="btn-em primary"><i class="fas fa-plus"></i>Nouvel OV</a>
      </div>
      <div id="ovList"></div>
  
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/api.js"></script>
<script src="/src/js/roles.js"></script>
<script>
const API = window.BASE_URL;
const tok = () => localStorage.getItem('pslsh_token');
async function post(url, body) {{
  const r = await fetch(API+url, {{method:'POST', headers:{{'Content-Type':'application/json',Authorization:'Bearer '+tok()}}, body: JSON.stringify(body)}});
  return r.json();
}}
function showAlert(type, msg) {{
  const a = document.getElementById('alert');
  a.className = 'em-alert visible ' + type;
  a.innerHTML = msg;
  a.scrollIntoView({{behavior:'smooth'}});
}}

const fmt = n => Math.round(parseFloat(n)||0).toLocaleString('fr-FR');
const STAT_META = {
  brouillon: {bg:'#f1f5f9',color:'#64748b',lbl:'Brouillon'},
  emis:      {bg:'#dbeafe',color:'#1d4ed8',lbl:'Émis'},
  ordonnance:{bg:'#fef3c7',color:'#92400e',lbl:'Ordonnancé'},
  execute:   {bg:'#dcfce7',color:'#166534',lbl:'Exécuté'},
  rejete:    {bg:'#fee2e2',color:'#b91c1c',lbl:'Rejeté'},
  annule:    {bg:'#f1f5f9',color:'#64748b',lbl:'Annulé'},
};
async function loadOv() {
  const st = document.getElementById('fStatut').value;
  const r = await fetch(API+'/emissions/ov'+(st?'?statut='+st:''),{headers:{Authorization:'Bearer '+tok()}});
  const b = await r.json();
  if (!b.success) { document.getElementById('ovList').innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8">Erreur API</div>'; return; }
  if (!b.data.length) { document.getElementById('ovList').innerHTML='<div style="padding:60px;text-align:center;color:#94a3b8;background:#fff;border:1px dashed #e2e8f0;border-radius:10px"><i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px"></i>Aucun OV pour ce filtre.</div>'; return; }
  document.getElementById('ovList').innerHTML = '<table style="width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;font-size:.76rem"><thead><tr style="background:#1b2f52;color:#fff"><th style="padding:9px 12px;text-align:left">Référence</th><th style="padding:9px 12px;text-align:left">Bénéficiaire</th><th style="padding:9px 12px;text-align:right">Montant</th><th style="padding:9px 12px;text-align:left">Objet</th><th style="padding:9px 12px;text-align:left">Date</th><th style="padding:9px 12px;text-align:center">Statut</th><th></th></tr></thead><tbody>'+b.data.map(o => {
    const sm = STAT_META[o.statut]||STAT_META.brouillon;
    return `<tr style="border-bottom:1px solid #f1f5f9"><td style="padding:8px 12px;font-family:monospace;font-weight:700">${o.reference}</td><td style="padding:8px 12px">${o.beneficiaire_nom}<br><small style="color:#94a3b8">${o.beneficiaire_banque||''}</small></td><td style="padding:8px 12px;text-align:right;font-family:monospace;font-weight:800">${fmt(o.montant)} ${o.devise}</td><td style="padding:8px 12px">${o.objet||''}</td><td style="padding:8px 12px">${new Date(o.createdAt).toLocaleDateString('fr-FR')}</td><td style="padding:8px 12px;text-align:center"><span style="padding:3px 9px;border-radius:14px;font-size:.65rem;font-weight:700;background:${sm.bg};color:${sm.color}">${sm.lbl}</span></td><td style="padding:8px 12px;text-align:right">${o.statut==='emis'?'<button onclick="doAct('+o.id+',\'ordonnance\')" style="font-size:.7rem;padding:4px 10px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:6px;cursor:pointer">Ordonnancer</button>':o.statut==='ordonnance'?'<button onclick="doAct('+o.id+',\'execute\')" style="font-size:.7rem;padding:4px 10px;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:6px;cursor:pointer">Marquer exécuté</button>':''}</td></tr>`;
  }).join('')+'</tbody></table>';
}
async function doAct(id, action) {
  const r = await post('/emissions/ov/'+id+'/'+action, {});
  if (r.success) loadOv(); else showAlert('err',r.message||'Erreur');
}
const params = new URLSearchParams(location.search);
if (params.get('statut')) document.getElementById('fStatut').value = params.get('statut');
loadOv();

</script>
</body></html>
