<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGFIC-PSLSH | Centre des notifications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../../src/css/main.css" rel="stylesheet">
  <style>
    html,body{height:100%;overflow:hidden}
    .app-layout,.main-content{height:100vh;overflow:hidden}
    .page-content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0}

    .nt-top{flex-shrink:0;padding:14px 28px 0;background:#fff;border-bottom:1px solid #e2e8f0}
    .nt-title{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:14px}
    .nt-title h5{margin:0;font-size:1rem;font-weight:800;color:#1b2f52}
    .nt-title small{font-size:.72rem;color:#64748b}
    .nt-stats{display:flex;gap:8px}
    .nt-pill{padding:5px 12px;border-radius:6px;font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
    .nt-pill.urgent{background:#fee2e2;color:#b91c1c}
    .nt-pill.high{background:#fef3c7;color:#92400e}
    .nt-pill.normal{background:#dbeafe;color:#1d4ed8}
    .nt-pill.low{background:#f1f5f9;color:#64748b}

    .nt-tabs{display:flex;gap:1px;padding-top:6px;border-bottom:2px solid #1b3a6b}
    .nt-tab{font-size:.78rem;font-weight:600;padding:9px 18px;cursor:pointer;background:#f1f5f9;color:#64748b;
      border:1px solid #e2e8f0;border-bottom:none;border-radius:7px 7px 0 0;
      display:inline-flex;align-items:center;gap:8px;transition:all .15s}
    .nt-tab:hover:not(.active){background:#e2e8f0;color:#1b2f52}
    .nt-tab.active{background:#1b3a6b;color:#fff;border-color:#1b3a6b;font-weight:700}
    .nt-tab .badge{background:rgba(255,255,255,.2);padding:1px 7px;border-radius:10px;font-size:.62rem;font-weight:700}
    .nt-tab:not(.active) .badge{background:#fef3c7;color:#b45309}

    .nt-body{flex:1;overflow-y:auto;padding:14px 28px 18px;background:#eef2f7}
    .nt-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
    .nt-toolbar select,.nt-toolbar input{font-size:.76rem;padding:5px 10px;height:32px;
      border:1px solid #cbd5e1;border-radius:7px;background:#fff}
    .nt-toolbar .ml-auto{margin-left:auto}
    .nt-btn{font-size:.74rem;font-weight:700;padding:6px 14px;border:1px solid #cbd5e1;border-radius:7px;
      background:#fff;color:#475569;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .nt-btn:hover{border-color:#1b3a6b;color:#1b3a6b}

    .nt-list{display:flex;flex-direction:column;gap:8px}
    .nt-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;
      display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:flex-start;
      border-left:4px solid #cbd5e1;transition:box-shadow .15s,transform .15s}
    .nt-card:hover{box-shadow:0 4px 12px rgba(15,23,42,.06)}
    .nt-card.unread{background:#fefce8;border-left-color:var(--accent,#1b3a6b)}
    .nt-card.done{opacity:.55}
    .nt-card.snoozed{opacity:.7;background:#f8fafc;border-left-color:#94a3b8}
    .nt-card.snoozed::after{content:'⏰ Reporté';position:absolute;top:8px;right:14px;
      font-size:.6rem;color:#64748b;font-weight:700}
    .nt-card{position:relative}

    .nt-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:1.05rem;flex-shrink:0;color:var(--accent,#1b3a6b);background:var(--accent-light,#f1f5f9)}
    .nt-content{min-width:0}
    .nt-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
    .nt-card-title{font-size:.92rem;font-weight:800;color:#1b2f52;line-height:1.25}
    .nt-card .nt-card-msg{font-size:.78rem;color:#475569;line-height:1.5;margin-top:3px}
    .nt-meta{display:flex;align-items:center;gap:12px;margin-top:8px;font-size:.7rem;color:#94a3b8;flex-wrap:wrap}
    .nt-meta span{display:inline-flex;align-items:center;gap:4px}
    .nt-cta{font-size:.72rem;font-weight:700;color:var(--accent,#1b3a6b);text-decoration:none;
      padding:3px 0;border-bottom:1px dashed var(--accent,#1b3a6b)}
    .nt-cta:hover{color:#1b2f52;border-color:#1b2f52}

    .nt-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;min-width:120px}
    .nt-act{font-size:.7rem;font-weight:600;padding:5px 9px;border:1px solid #cbd5e1;border-radius:6px;
      background:#fff;color:#475569;cursor:pointer;display:inline-flex;align-items:center;gap:5px;justify-content:flex-start;white-space:nowrap}
    .nt-act:hover{border-color:#1b3a6b;color:#1b3a6b}
    .nt-act.primary{background:#dcfce7;border-color:#86efac;color:#15803d}
    .nt-act.primary:hover{background:#bbf7d0}
    .nt-act.warn{background:#fef3c7;border-color:#fcd34d;color:#92400e}
    .nt-act.warn:hover{background:#fde68a}

    .nt-empty{padding:60px 20px;text-align:center;color:#94a3b8;background:#fff;border:1px dashed #e2e8f0;border-radius:12px}
    .nt-empty i{display:block;font-size:2.5rem;margin-bottom:10px;opacity:.5}
    .nt-empty p{margin:0;font-size:.78rem}
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/logo/logo-pslsh.png" alt="SIGFIC-PSLSH" class="brand-logo">
      <div class="brand-text"><div class="brand-name">SIGFIC-PSLSH</div><div class="brand-sub">Centre de notifications</div></div>
    </div>
    <div id="sidebarServiceBadge"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="sf-version">SIGFIC-PSLSH v2.0</div></div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><nav><ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="/pages/accueil/index.html" class="text-muted">Accueil</a></li>
        <li class="breadcrumb-item active fw-semibold">Notifications</li>
      </ol></nav></div>
      <div class="topbar-center"><i class="fas fa-bell me-1"></i>Centre des rappels et notifications</div>
      <div class="topbar-right">
        <div class="topbar-notif"><i class="fas fa-bell"></i><span class="notif-dot"></span></div>
        <div class="dropdown">
          <button class="btn btn-sm btn-light dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--c-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700" id="userAvatar">?</div>
            <span id="userName" style="font-size:.82rem;font-weight:600"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/pages/admin/profile.html"><i class="fas fa-user me-2"></i>Mon profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="btnLogout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
    </div>

    <div class="page-content">
      <div class="nt-top">
        <div class="nt-title">
          <div>
            <h5><i class="fas fa-bell me-2" style="color:#1b3a6b"></i>Centre des rappels et notifications</h5>
            <small>Toutes les alertes, tâches et messages filtrés selon vos habilitations</small>
          </div>
          <div class="nt-stats" id="ntStats"></div>
        </div>
        <div class="nt-tabs">
          <button class="nt-tab active" data-tab="toutes" onclick="switchTab('toutes')"><i class="fas fa-inbox"></i>Toutes <span class="badge" id="cTout">—</span></button>
          <button class="nt-tab"        data-tab="alertes" onclick="switchTab('alertes')"><i class="fas fa-exclamation-triangle"></i>Alertes <span class="badge" id="cAlert">—</span></button>
          <button class="nt-tab"        data-tab="taches"  onclick="switchTab('taches')"><i class="fas fa-check-double"></i>Tâches <span class="badge" id="cTask">—</span></button>
          <button class="nt-tab"        data-tab="messages" onclick="switchTab('messages')"><i class="far fa-comment"></i>Messages <span class="badge" id="cMsg">—</span></button>
        </div>
      </div>

      <div class="nt-body">
        <div class="nt-toolbar">
          <select id="fStatus" onchange="render()">
            <option value="active">Actives (non traitées)</option>
            <option value="unread">Non lues uniquement</option>
            <option value="done">Traitées</option>
            <option value="snoozed">Reportées</option>
            <option value="">Toutes</option>
          </select>
          <select id="fPriority" onchange="render()">
            <option value="">Toutes priorités</option>
            <option value="urgent">Urgent</option>
            <option value="high">Haute</option>
            <option value="normal">Normale</option>
            <option value="low">Basse</option>
          </select>
          <input type="text" id="fSearch" placeholder="Rechercher dans le titre…" oninput="render()" style="min-width:220px">
          <button class="nt-btn ml-auto" onclick="markAllRead()"><i class="far fa-check-circle"></i>Tout marquer comme lu</button>
          <button class="nt-btn" onclick="loadAll()"><i class="fas fa-sync"></i>Rafraîchir</button>
        </div>
        <div id="ntList" class="nt-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../src/js/api.js"></script>
<script src="../../src/js/roles.js"></script>
<script>
const API = window.BASE_URL;
const tok = () => localStorage.getItem('pslsh_token');
async function get(url) { const r = await fetch(API + url, { headers: { Authorization: 'Bearer ' + tok() }}); return r.json(); }
async function post(url, body) { const r = await fetch(API + url, { method:'POST', headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+tok() }, body: body ? JSON.stringify(body) : undefined }); return r.json(); }

let _all = [];
let _currentTab = 'toutes';

const TYPE_META = {
  alert:    { color:'#b91c1c', light:'#fee2e2', icon:'exclamation-triangle' },
  task:     { color:'#1d4ed8', light:'#dbeafe', icon:'check-double' },
  reminder: { color:'#b45309', light:'#fef3c7', icon:'clock' },
  message:  { color:'#0f766e', light:'#ccfbf1', icon:'comment-dots' },
  info:     { color:'#475569', light:'#f1f5f9', icon:'info-circle' },
};
const PRIO_PILL = { urgent:'urgent', high:'high', normal:'normal', low:'low' };

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'à l\'instant';
  if (min < 60) return 'il y a ' + min + ' min';
  if (min < 24*60) return 'il y a ' + Math.floor(min/60) + ' h';
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function fmtDueDate(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const days = Math.ceil((d - Date.now()) / (24*3600*1000));
  if (days < 0)  return { txt:'⏰ Retard de ' + Math.abs(days) + ' j', cls:'urgent' };
  if (days === 0) return { txt:'⏰ Aujourd\'hui', cls:'urgent' };
  if (days <= 3) return { txt:'⏰ Dans ' + days + ' j', cls:'high' };
  return { txt:'⏰ Échéance ' + d.toLocaleDateString('fr-FR'), cls:'low' };
}

async function loadAll() {
  const [list, count] = await Promise.all([get('/notifications?status='), get('/notifications/count')]);
  if (!list.success) { document.getElementById('ntList').innerHTML = '<div class="nt-empty"><i class="fas fa-times-circle"></i><p>API indisponible.</p></div>'; return; }
  _all = list.data || [];
  if (count.success) {
    const k = count.data;
    document.getElementById('ntStats').innerHTML = `
      <span class="nt-pill urgent">${k.by_priority.urgent || 0} urgent</span>
      <span class="nt-pill high">${k.by_priority.high || 0} haute</span>
      <span class="nt-pill normal">${k.unread} non lu(es)</span>`;
    document.getElementById('cTout').textContent  = k.active;
    document.getElementById('cAlert').textContent = k.by_type.alert    || 0;
    document.getElementById('cTask').textContent  = (k.by_type.task || 0) + (k.by_type.reminder || 0);
    document.getElementById('cMsg').textContent   = (k.by_type.message || 0) + (k.by_type.info || 0);
  }
  render();
}

function filterTab(items, tab) {
  if (tab === 'alertes')  return items.filter(n => n.type === 'alert');
  if (tab === 'taches')   return items.filter(n => n.type === 'task' || n.type === 'reminder');
  if (tab === 'messages') return items.filter(n => n.type === 'message' || n.type === 'info');
  return items;
}

function render() {
  const fStatus   = document.getElementById('fStatus').value;
  const fPriority = document.getElementById('fPriority').value;
  const fSearch   = (document.getElementById('fSearch').value || '').toLowerCase();

  let items = filterTab(_all, _currentTab);
  if (fStatus === 'active')  items = items.filter(n => ['unread','read'].includes(n.status));
  else if (fStatus)          items = items.filter(n => n.status === fStatus);
  if (fPriority)             items = items.filter(n => n.priority === fPriority);
  if (fSearch)               items = items.filter(n => (n.title+' '+n.message).toLowerCase().includes(fSearch));

  const target = document.getElementById('ntList');
  if (!items.length) {
    target.innerHTML = '<div class="nt-empty"><i class="far fa-bell-slash"></i><p>Aucune notification ne correspond à vos filtres.</p></div>';
    return;
  }
  target.innerHTML = items.map(n => {
    const meta  = TYPE_META[n.type] || TYPE_META.info;
    const prio  = PRIO_PILL[n.priority];
    const due   = fmtDueDate(n.due_date);
    return `<div class="nt-card ${n.status}" style="--accent:${meta.color};--accent-light:${meta.light}">
      <div class="nt-ico"><i class="fas fa-${n.icon || meta.icon}"></i></div>
      <div class="nt-content">
        <div class="nt-head">
          <span class="nt-pill ${prio}">${n.priority}</span>
          <span class="nt-card-title">${n.title}</span>
        </div>
        <div class="nt-card-msg">${n.message}</div>
        <div class="nt-meta">
          <span><i class="far fa-calendar"></i>${fmtDate(n.createdAt)}</span>
          ${due ? `<span class="nt-pill ${due.cls}" style="font-size:.6rem">${due.txt}</span>` : ''}
          <span><i class="fas fa-tag"></i>${n.category}</span>
          ${n.action_url ? `<a href="${n.action_url}" class="nt-cta">${n.action_label || 'Ouvrir'} →</a>` : ''}
        </div>
      </div>
      <div class="nt-actions">
        ${n.status !== 'done' ? `<button class="nt-act primary" onclick="act(${n.id},'done')"><i class="fas fa-check"></i>Marquer fait</button>` : ''}
        ${n.status === 'unread' ? `<button class="nt-act" onclick="act(${n.id},'read')"><i class="far fa-eye"></i>Marquer lu</button>` : ''}
        ${n.status !== 'snoozed' && n.status !== 'done' ? `<button class="nt-act warn" onclick="act(${n.id},'snooze',{hours:24})"><i class="far fa-clock"></i>Reporter 24h</button>` : ''}
        <button class="nt-act" onclick="act(${n.id},'dismiss')" style="color:#b91c1c;border-color:#fca5a5"><i class="fas fa-times"></i>Ignorer</button>
      </div>
    </div>`;
  }).join('');
}

async function act(id, action, body) {
  const r = await post(`/notifications/${id}/${action}`, body);
  if (r.success) loadAll();
  else alert('Erreur : ' + (r.message || 'inconnue'));
}

async function markAllRead() {
  if (!confirm('Marquer toutes les notifications comme lues ?')) return;
  const r = await post('/notifications/mark-all-read');
  if (r.success) loadAll();
}

function switchTab(name) {
  _currentTab = name;
  document.querySelectorAll('.nt-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  render();
}

function init() {
  const tab = new URLSearchParams(window.location.search).get('tab');
  if (tab && ['alertes','taches','messages'].includes(tab)) _currentTab = tab;
  loadAll();
  // Auto-refresh badge toutes les 60s
  setInterval(loadAll, 60000);
  // Activer le bon onglet
  document.querySelectorAll('.nt-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === _currentTab));
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
