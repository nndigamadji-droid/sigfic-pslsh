<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGFIC-PSLSH | Expression de besoins</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../../src/css/main.css" rel="stylesheet">
  <style>
    html, body { height:100%; overflow:hidden; }
    .app-layout, .main-content { height:100vh; overflow:hidden; }
    .page-content { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0; }

    .eb-top { flex-shrink:0; padding:12px 24px 8px; background:#fff; border-bottom:1px solid #e2e8f0; }
    .eb-title-row h5 { margin:0; font-size:.96rem; font-weight:800; color:#1b2f52; }
    .eb-title-row small { font-size:.7rem; color:#64748b; }

    .eb-body { flex:1; overflow:hidden; display:flex; flex-direction:column; background:#eef2f7; }
    .eb-canvas { flex:1; overflow-y:auto; padding:14px 24px; }

    .sheet-tabs {
      flex-shrink:0; display:flex; align-items:flex-end; gap:0;
      background:#dbe1ea; border-bottom:1px solid #94a3b8;
      padding:6px 16px 0; min-height:36px; overflow-x:auto; overflow-y:hidden;
    }
    .sheet-tab {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 18px; font-size:.78rem; font-weight:600; color:#475569;
      background:#cbd3dd; border:1px solid #94a3b8; border-top:none;
      border-radius:4px 4px 0 0;
      cursor:pointer; user-select:none; white-space:nowrap;
      position:relative; bottom:-1px; transition:background .15s;
    }
    .sheet-tab:hover { background:#dee3eb; }
    .sheet-tab.active {
      background:#eef2f7; color:#1b3a6b; font-weight:800;
      border-bottom:2px solid #15803d;
      box-shadow:0 2px 4px rgba(0,0,0,.04);
      padding-bottom:6px; bottom:-1px; z-index:2;
    }
    .sheet-tab .count {
      background:rgba(27,58,107,.10); color:#1b3a6b;
      font-size:.65rem; padding:1px 7px; border-radius:10px;
      font-family:monospace; font-weight:700;
    }
    .sheet-tab.active .count { background:#dcfce7; color:#15803d; }

    .eb-card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:18px 22px; }
    .eb-card-title {
      font-size:.78rem; font-weight:800; color:#1b2f52;
      text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px;
      display:flex; align-items:center; gap:8px;
      padding-bottom:10px; border-bottom:1px solid #f1f5f9;
    }

    .eb-tbl { width:100%; border-collapse:collapse; font-size:.79rem; }
    .eb-tbl thead th {
      background:#f1f5f9; color:#1b2f52; font-size:.69rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.03em; padding:10px 12px;
      border-bottom:2px solid #e2e8f0; text-align:left; white-space:nowrap;
    }
    .eb-tbl tbody td { padding:9px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .eb-tbl tbody tr:hover td { background:#eff6ff; transition:background .1s; }
    .eb-tbl .mono { font-family:monospace; color:#1d4ed8; font-weight:700; font-size:.75rem; }
    .eb-tbl .num { font-family:monospace; text-align:right; font-feature-settings:'tnum' 1; }

    .st-pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 9px; border-radius:18px; font-size:.66rem; font-weight:700; white-space:nowrap;
    }
    .st-brouillon { background:#f1f5f9; color:#64748b; }
    .st-soumis    { background:#dbeafe; color:#1d4ed8; }
    .st-saf       { background:#fef3c7; color:#b45309; }
    .st-compta    { background:#ede9fe; color:#6d28d9; }
    .st-coordo    { background:#cffafe; color:#0e7490; }
    .st-valide    { background:#dcfce7; color:#15803d; }
    .st-rejete    { background:#fee2e2; color:#b91c1c; }

    .empty {
      text-align:center; padding:50px 20px; color:#94a3b8;
      background:#fff; border:1px dashed #e2e8f0; border-radius:12px;
    }
    .empty i { font-size:2.5rem; margin-bottom:10px; opacity:.5; }

    .eb-form { display:grid; grid-template-columns:1fr 1fr; gap:14px 22px; }
    .eb-form .full { grid-column:1 / -1; }
    .eb-form label {
      display:block; font-size:.66rem; font-weight:700; color:#64748b;
      text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px;
    }
    .eb-form input, .eb-form select, .eb-form textarea {
      width:100%; font-size:.82rem; padding:8px 12px;
      border:1px solid #cbd5e1; border-radius:8px;
    }
    .eb-form textarea { min-height:80px; resize:vertical; }
    .eb-form .form-actions {
      grid-column:1 / -1; display:flex; gap:10px; justify-content:flex-end;
      padding-top:14px; border-top:1px solid #f1f5f9;
    }

    .lignes-block {
      grid-column:1 / -1; background:#f8fafc;
      border:1px solid #e2e8f0; border-radius:10px; padding:14px 16px;
    }
    .lignes-block .lb-title {
      font-size:.7rem; font-weight:700; color:#475569;
      text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .ligne-row {
      display:grid; grid-template-columns:30px 1fr 120px 38px; gap:10px;
      align-items:center; margin-bottom:4px;
    }
    .ligne-tag {
      grid-column:2 / 4; display:flex; align-items:center; gap:8px;
      margin:2px 0 10px; padding:5px 10px;
      background:#f1f5f9; border-radius:6px; font-size:.7rem;
    }
    .ligne-tag .tag-pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:2px 9px; border-radius:14px; font-size:.66rem; font-weight:700;
    }
    .ligne-tag .tag-code {
      font-family:monospace; font-weight:800; color:#1b3a6b;
    }
    .ligne-tag .tag-info {
      flex:1; color:#475569; font-size:.7rem;
    }
    .ligne-tag .tag-override {
      font-size:.66rem; padding:3px 6px; border:1px solid #cbd5e1;
      border-radius:5px; background:#fff; color:#475569; cursor:pointer;
    }
    .ligne-tag.unclassified {
      background:#fef2f2; border:1px dashed #fca5a5;
    }
    .ligne-tag.unclassified .tag-info { color:#b91c1c; font-weight:600; }

    .syscohada-summary {
      background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px;
      padding:10px 14px; margin-top:14px; font-size:.78rem; color:#1b3a6b;
      display:flex; align-items:flex-start; gap:10px;
    }
    .syscohada-summary i { color:#1d4ed8; font-size:1.1rem; margin-top:2px; }
    .syscohada-summary strong { color:#1b2f52; }
    .syscohada-summary .sc-row {
      display:flex; gap:14px; flex-wrap:wrap; margin-top:4px; font-size:.72rem;
    }
    .syscohada-summary .sc-row span { color:#475569; }
    .syscohada-summary .sc-row code {
      background:#dbeafe; color:#1b3a6b; padding:1px 6px; border-radius:4px;
      font-weight:700; font-family:monospace;
    }
    .ligne-row .ligne-num {
      width:30px; height:30px; border-radius:50%;
      background:#1b3a6b; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:.78rem;
    }
    .ligne-row input { font-size:.82rem; padding:7px 11px; border:1px solid #cbd5e1; border-radius:7px; background:#fff; }
    .btn-row {
      width:38px; height:38px; border-radius:7px;
      background:#fff; color:#b91c1c; border:1px solid #fca5a5;
      cursor:pointer; transition:all .15s;
      display:flex; align-items:center; justify-content:center;
    }
    .btn-row:hover { background:#fee2e2; }
    .btn-row.disabled { color:#cbd5e1; border-color:#e2e8f0; cursor:not-allowed; }
    .btn-row.disabled:hover { background:#fff; }
    .btn-add-ligne {
      font-size:.74rem; font-weight:700; padding:7px 14px;
      background:#fff; color:#1b3a6b; border:1px dashed #1b3a6b; border-radius:7px;
      cursor:pointer; display:inline-flex; align-items:center; gap:6px;
      transition:all .15s;
    }
    .btn-add-ligne:hover { background:#eff6ff; }
    .btn-eb {
      font-size:.78rem; font-weight:700; padding:8px 18px; min-height:36px;
      border-radius:8px; border:1px solid; cursor:pointer;
      display:inline-flex; align-items:center; gap:7px; transition:all .15s;
    }
    .btn-eb-cancel { background:#fff; color:#475569; border-color:#cbd5e1; }
    .btn-eb-cancel:hover { background:#f8fafc; }
    .btn-eb-save   { background:#475569; color:#fff; border-color:#475569; }
    .btn-eb-submit { background:#1b3a6b; color:#fff; border-color:#1b3a6b; }
    .btn-eb-submit:hover { background:#254d8f; }
  </style>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/logo/logo-pslsh.png" alt="SIGFIC-PSLSH" class="brand-logo">
      <div class="brand-text">
        <div class="brand-name">SIGFIC-PSLSH</div>
        <div class="brand-sub">Gestion Financière</div>
      </div>
    </div>
    <div id="sidebarServiceBadge"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="sf-version">SIGFIC-PSLSH v2.0</div></div>
  </aside>

  <div class="main-content">

    <div class="topbar">
      <div class="topbar-left">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item text-muted">Opérations</li>
            <li class="breadcrumb-item active fw-semibold" id="bcTitle">Expression de besoins</li>
          </ol>
        </nav>
      </div>
      <div class="topbar-center">
        <i class="fas fa-list-check me-1"></i>Exercice <strong>2026</strong>
      </div>
      <div class="topbar-right">
        <div class="topbar-notif"><i class="fas fa-bell"></i><span class="notif-dot"></span></div>
        <div class="dropdown">
          <button class="btn btn-sm btn-light dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--c-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700" id="userAvatar">?</div>
            <span id="userName" style="font-size:.82rem;font-weight:600"></span>

          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../admin/profile.html"><i class="fas fa-user me-2"></i>Mon profil</a></li>
            <li><hr class="dropdown-divider"></li>

          </ul>

    <div class="page-content">

      <div class="eb-top">

          <h5 id="paneTitle"><i class="fas fa-list-check me-2" style="color:#1b3a6b"></i>Expression de besoins</h5>
          <small id="paneSub">Initialisation de toute opération PSLSH/IST · exercice 2026</small>
        </div>
      </div>

      <div class="eb-body">
        <div class="sheet-tabs" id="sheetTabs"></div>
        <div class="eb-canvas" id="ebCanvas"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../src/js/api.js"></script>
<script src="../../src/js/roles.js"></script>
<script src="../../src/js/syscohada.js"></script>
<script>
const STORAGE_EB_ALL = 'pslsh_eb_all_v1';
const STORAGE_EB_VALIDATED = 'pslsh_eb_v1';
const CURRENT_USER = 'Resp. SAF';

const TYPES = [
  { code:'ACH-S', label:'Achat simple' },
  { code:'ACH-P', label:'Achat par passation' },
  { code:'FOR-M', label:'Formation / mission' },
  { code:'PER-A', label:'Personnel / assistance' },
];
const SERVICES = ['SAF','SGAS','SPCH','SPCG','SESRO','APMS','SEB','SPSAC','SC','SLNR','COORD'];
const SOURCES = ['PSLSH-032','PSLSH-033','PSLSH-034','PSLSH-035'];

const DEFAULT_EB_ALL = [
  { id:'EB-2026-0007', motif:'Renouvellement stock dépistage Q2',          service:'APMS',  porteur:'Chef APMS',  type:'ACH-P', statut:'compta',    soumis:'15/02/2026',
    lignes:[{ libelle:'Tests combinés VIH/Syphilis Dual RDT', quantite:'2000 boîtes' }] },
  { id:'EB-2026-0008', motif:'Saturation entrepôt actuel',                  service:'APMS',  porteur:'Chef APMS',  type:'ACH-P', statut:'saf',       soumis:'20/02/2026',
    lignes:[{ libelle:'Construction entrepôt 80m²', quantite:'1 ouvrage' },
            { libelle:'Aménagement rayonnage métallique', quantite:'40 modules' }] },
  { id:'EB-2026-0011', motif:'Supervision trimestrielle programmée',        service:'SPCH',  porteur:'Chef SPCH',  type:'PER-A', statut:'soumis',    soumis:'05/03/2026',
    lignes:[{ libelle:'Indemnités mission (5 superviseurs)', quantite:'5 personnes × 4 jours' },
            { libelle:'Carburant véhicule de mission', quantite:'180 litres' }] },
  { id:'EB-2026-0012', motif:'Partenariat ratification 2026',                service:'COORD', porteur:'Coordo',     type:'PER-A', statut:'brouillon', soumis:'08/03/2026',
    lignes:[{ libelle:'Don ordinateurs portables', quantite:'5 unités' }] },
  { id:'EB-2026-0013', motif:'Cadrage exercice 2027',                         service:'COORD', porteur:'Coordo',     type:'FOR-M', statut:'coordo',    soumis:'12/03/2026',
    lignes:[{ libelle:'Location salle séminaire', quantite:'3 jours' },
            { libelle:'Restauration participants', quantite:'80 personnes × 3 jours' },
            { libelle:'Per diem coordonnateurs régionaux', quantite:'12 personnes × 3 jours' }] },
  { id:'EB-2026-0019', motif:'Stock épuisé Q2',                              service:'SAF',   porteur:'Resp. SAF',  type:'ACH-S', statut:'brouillon', soumis:'04/04/2026',
    lignes:[{ libelle:'Ramettes papier A4', quantite:'40 cartons' },
            { libelle:'Cartouches d\'encre HP', quantite:'25 boîtes' },
            { libelle:'Stylos et marqueurs assortis', quantite:'10 lots' }] },
];

let _ebAll = [];
let _currentTab = '';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_EB_ALL);
    const data = raw ? JSON.parse(raw) : DEFAULT_EB_ALL;
    _ebAll = Array.isArray(data) && data.length ? data : DEFAULT_EB_ALL;
  } catch (_) { _ebAll = DEFAULT_EB_ALL; }
  if (!localStorage.getItem(STORAGE_EB_ALL)) save();
}

function save() { localStorage.setItem(STORAGE_EB_ALL, JSON.stringify(_ebAll)); }

function fmt(n) { return Math.round(n).toLocaleString('fr-FR'); }

function statutPill(s) {
  const map = {
    brouillon: ['st-brouillon', 'Brouillon'],
    soumis:    ['st-soumis',    'Soumis — En attente SAF'],
    saf:       ['st-saf',       'En validation SAF'],
    compta:    ['st-compta',    'En validation Comptable'],
    coordo:    ['st-coordo',    'En validation Coordo'],
    valide:    ['st-valide',    'Validée'],
    rejete:    ['st-rejete',    'Rejetée'],
  };
  const [cls, txt] = map[s] || map.brouillon;
  return `<span class="st-pill ${cls}">${txt}</span>`;
}

const TABS = [
  { code:'new',     label:'Saisir un nouveau besoin', icon:'fa-plus-circle', filter: null },
  { code:'mine',    label:'Mes besoins en cours',    icon:'fa-user-clock',   filter: (e) => e.porteur === CURRENT_USER && !['valide','rejete'].includes(e.statut) },
  { code:'pending', label:'Besoins en attente de validation', icon:'fa-hourglass-half',
    filter: (e) => ['soumis','saf','compta','coordo'].includes(e.statut) },
];

function countTab(tab) {
  if (!tab.filter) return null;
  return _ebAll.filter(tab.filter).length;
}

function renderTabs() {
  const html = TABS.map((t) => {
    const active = t.code === _currentTab ? ' active' : '';
    const n = countTab(t);
    return `<div class="sheet-tab${active}" onclick="switchTab('${t.code}')">
      <i class="fas ${t.icon}"></i>${t.label}
      ${n != null ? `<span class="count">${n}</span>` : ''}
    </div>`;
  }).join('');
  document.getElementById('sheetTabs').innerHTML = html;
}

function switchTab(code) {
  _currentTab = code;
  const url = new URL(window.location);
  if (code === 'new') url.searchParams.set('action', 'new');
  else { url.searchParams.set('filter', code); url.searchParams.delete('action'); }
  window.history.replaceState({}, '', url);
  render();
}

function renderList(items, emptyMsg) {
  if (!items.length) {
    return `<div class="empty"><i class="fas fa-inbox d-block"></i>${emptyMsg}</div>`;
  }
  const rows = items.map((e) => {
    const lignes = e.lignes || (e.titre ? [{ libelle:e.titre, quantite:'' }] : []);
    const firstLine = lignes[0]?.libelle || '—';
    const more = lignes.length > 1 ? ` <small style="color:#1d4ed8;font-weight:700">+${lignes.length - 1} autre${lignes.length > 2 ? 's' : ''}</small>` : '';
    const dom = e.sysco_code && e.sysco_code !== '?' ? SYSCOHADA.getByCode(e.sysco_code) : null;
    const syscoCell = dom
      ? `<span style="font-family:monospace;color:#1b3a6b;font-weight:700">${dom.code}</span><br><small style="color:#94a3b8">${dom.famille}</small>`
      : `<span style="color:#b91c1c;font-size:.7rem">À classer</span>`;
    return `<tr>
      <td class="mono">${e.id}</td>
      <td><strong>${firstLine}</strong>${more}<br><small style="color:#94a3b8">${e.service} · ${e.porteur} · soumis ${e.soumis}</small></td>
      <td>${syscoCell}</td>
      <td><small style="color:#475569">${(e.motif || '').slice(0, 80)}${(e.motif || '').length > 80 ? '…' : ''}</small></td>
      <td>${statutPill(e.statut)}</td>
    </tr>`;
  }).join('');
  return `<div class="eb-card"><table class="eb-tbl">
    <thead><tr>
      <th style="width:140px">Référence</th>
      <th>Libellé principal</th>
      <th style="width:140px">Compte SYSCOHADA</th>
      <th>Motif</th>
      <th style="width:200px">Statut</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

let _formLignes = [{ libelle:'', quantite:'' }];

function renderForm() {
  return `<div class="eb-card">
    <div class="eb-card-title"><i class="fas fa-edit" style="color:#1b3a6b"></i>Nouvelle expression de besoin</div>
    <form class="eb-form" id="ebForm" onsubmit="event.preventDefault();submitEb(event)">
      <div>
        <label>Service porteur *</label>
        <select name="service" required onchange="updateSyscoSummary()">
          ${SERVICES.map((s) => `<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
      <div>
        <label>Type de besoin (SYSCOHADA)</label>
        <input type="text" id="syscoMain" readonly placeholder="Détecté à la saisie des libellés…"
          style="background:#f8fafc;color:#1b3a6b;font-family:monospace;font-size:.78rem;font-weight:700">
      </div>
      <div class="lignes-block">
        <div class="lb-title">
          <span><i class="fas fa-list-ul me-2" style="color:#1b3a6b"></i>Libellés du besoin</span>
          <span style="font-weight:600;text-transform:none;color:#94a3b8" id="lignesCount">1 ligne</span>
        </div>
        <div id="lignesList"></div>
        <button type="button" class="btn-add-ligne" onclick="addLigne()">
          <i class="fas fa-plus"></i>Ajouter un libellé
        </button>
        <div id="syscohadaSummary"></div>
      </div>

      <div class="full">
        <label>Motif du besoin *</label>
        <textarea name="motif" required placeholder="Pourquoi ce besoin ? Contexte, urgence, finalité…"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-eb btn-eb-cancel" onclick="switchTab('mine')"><i class="fas fa-times"></i>Annuler</button>
        <button type="submit" name="action" value="save" class="btn-eb btn-eb-save" onclick="this.value='save'"><i class="fas fa-save"></i>Enregistrer en brouillon</button>
        <button type="submit" name="action" value="submit" class="btn-eb btn-eb-submit" onclick="this.value='submit'"><i class="fas fa-paper-plane"></i>Soumettre pour validation</button>
      </div>
    </form>
  </div>`;
}

function renderLignes() {
  const target = document.getElementById('lignesList');
  if (!target) return;
  target.innerHTML = _formLignes.map((l, i) => {
    const cat = (l.libelle || '').trim() ? SYSCOHADA.classify(l.libelle) : null;
    return `
    <div class="ligne-row">
      <div class="ligne-num">${i + 1}</div>
      <input type="text" placeholder="Libellé du besoin (ex. Ramettes papier A4)"
             value="${(l.libelle || '').replace(/"/g, '&quot;')}"
             oninput="updateLigne(${i},'libelle',this.value)">
      <input type="text" placeholder="Quantité (ex. 40 cartons)"
             value="${(l.quantite || '').replace(/"/g, '&quot;')}"
             oninput="updateLigne(${i},'quantite',this.value)">
      <button type="button" class="btn-row ${_formLignes.length === 1 ? 'disabled' : ''}"
              ${_formLignes.length === 1 ? 'disabled' : ''}
              onclick="removeLigne(${i})" title="Retirer ce libellé">
        <i class="fas fa-minus"></i>
      </button>
    </div>
    ${cat ? renderCategoryTag(cat, i) : ''}`;
  }).join('');
  document.getElementById('lignesCount').textContent =
    `${_formLignes.length} ligne${_formLignes.length > 1 ? 's' : ''}`;
  updateSyscoSummary();
}

function renderCategoryTag(cat, i) {
  const isUnknown = cat.code === '?';
  const typeMeta = SYSCOHADA.TYPE_TO_FAMILLE_LABEL[cat.type] || SYSCOHADA.TYPE_TO_FAMILLE_LABEL.autre;
  return `<div class="ligne-tag ${isUnknown ? 'unclassified' : ''}">
    <span class="tag-pill" style="background:${typeMeta.bg};color:${typeMeta.color}">
      <i class="fas fa-${isUnknown ? 'exclamation-circle' : 'magic'}"></i>${typeMeta.label}
    </span>
    <span class="tag-code">${cat.code}</span>
    <span class="tag-info">${cat.libelle} <em style="color:#94a3b8">· ${cat.famille}</em></span>
    <select class="tag-override" onchange="overrideCategory(${i}, this.value)">
      <option value="">Modifier…</option>
      ${SYSCOHADA.CATALOG.map((c) => `<option value="${c.code}" ${c.code === cat.code ? 'selected' : ''}>${c.code} — ${c.libelle}</option>`).join('')}
    </select>
  </div>`;
}

function updateLigne(i, field, value) {
  _formLignes[i][field] = value;
  if (field === 'libelle') {
    if (_formLignes[i].override) delete _formLignes[i].override;
    renderLignes();
  } else {
    updateSyscoSummary();
  }
}

function overrideCategory(i, code) {
  if (!code) return;
  _formLignes[i].override = code;
  renderLignes();
}

function effectiveCategory(l) {
  if (l.override) return SYSCOHADA.getByCode(l.override);
  return (l.libelle || '').trim() ? SYSCOHADA.classify(l.libelle) : null;
}

function updateSyscoSummary() {
  const lignes = _formLignes.map((l) => ({ ...l, _cat: effectiveCategory(l) })).filter((l) => l._cat);
  const mainEl = document.getElementById('syscoMain');
  const sumEl  = document.getElementById('syscohadaSummary');
  if (!mainEl || !sumEl) return;

  if (!lignes.length) {
    mainEl.value = '';
    sumEl.innerHTML = '';
    return;
  }
  const tally = {};
  lignes.forEach((l) => { tally[l._cat.code] = (tally[l._cat.code] || 0) + 1; });
  const dominantCode = Object.keys(tally).sort((a, b) => tally[b] - tally[a])[0];
  const dom = SYSCOHADA.getByCode(dominantCode) || lignes[0]._cat;
  mainEl.value = `${dom.code} — ${dom.libelle}`;

  const svc = document.querySelector('select[name="service"]').value;
  const dossierTitle = SYSCOHADA.suggestDossierTitle('', _formLignes);
  const budgetLine   = SYSCOHADA.suggestBudgetLine(svc, _formLignes);
  const uniqueCats   = Object.keys(tally).length;

  sumEl.innerHTML = `<div class="syscohada-summary">
    <i class="fas fa-brain"></i>
    <div>
      <strong>Classification SYSCOHADA dérivée automatiquement</strong>
      <div class="sc-row">
        <span>Compte dominant : <code>${dom.code}</code> ${dom.libelle}</span>
        <span>Catégories distinctes : <strong>${uniqueCats}</strong></span>
      </div>
      <div class="sc-row">
        <span>Titre du dossier suggéré : <strong>${dossierTitle}</strong></span>
      </div>
      <div class="sc-row">
        <span>Ligne budgétaire suggérée : <code>${budgetLine}</code></span>
        <span>Libellé écriture : <em>${dom.libelle} — ${svc || 'service'}</em></span>
      </div>
    </div>
  </div>`;
}

function addLigne() {
  _formLignes.push({ libelle:'', quantite:'' });
  renderLignes();
}

function removeLigne(i) {
  if (_formLignes.length <= 1) return;
  _formLignes.splice(i, 1);
  renderLignes();
}

let _lastClickedAction = 'save';
document.addEventListener('click', (e) => {
  if (e.target.matches('button[name="action"]')) _lastClickedAction = e.target.value;
});

const TYPE_FROM_SYSCO = {
  immo: 'ACH-P', stock: 'ACH-P', service: 'ACH-S',
  charge: 'ACH-S', personnel: 'PER-A', autre: 'PER-A',
};

function submitEb(evt) {
  const form = evt.target;
  const fd = new FormData(form);
  const validLignes = _formLignes
    .filter((l) => (l.libelle || '').trim())
    .map((l) => {
      const cat = effectiveCategory(l);
      return {
        libelle: l.libelle,
        quantite: l.quantite,
        sysco_code: cat ? cat.code : '?',
        sysco_libelle: cat ? cat.libelle : '',
        sysco_famille: cat ? cat.famille : '',
        sysco_type: cat ? cat.type : 'autre',
        ligne_budget_suggested: cat ? cat.ligne_budget : 'L-A-CLASSER',
      };
    });
  if (!validLignes.length) {
    alert('Renseignez au moins un libellé de besoin.');
    return;
  }
  const dom = SYSCOHADA.dominantCategory(validLignes);
  const inferredType = dom ? (TYPE_FROM_SYSCO[dom.type] || 'ACH-S') : 'ACH-S';
  const seq = String(_ebAll.length + 20).padStart(4, '0');
  const service = fd.get('service');
  const nb = {
    id: `EB-2026-${seq}`,
    type: inferredType,
    sysco_code: dom ? dom.code : '?',
    sysco_libelle: dom ? dom.libelle : '',
    titre_suggested: SYSCOHADA.suggestDossierTitle('', validLignes),
    ligne_budget_suggested: SYSCOHADA.suggestBudgetLine(service, validLignes),
    service,
    porteur: CURRENT_USER,
    motif: fd.get('motif') || '',
    lignes: validLignes,
    statut: _lastClickedAction === 'submit' ? 'soumis' : 'brouillon',
    soumis: new Date().toLocaleDateString('fr-FR'),
  };
  _ebAll.unshift(nb);
  save();
  _formLignes = [{ libelle:'', quantite:'' }];
  alert(`Besoin ${nb.id} ${_lastClickedAction === 'submit' ? 'soumis pour validation' : 'enregistré en brouillon'}\n\nClassification : ${dom ? dom.code + ' — ' + dom.libelle : 'À classer'}\nLigne budgétaire : ${nb.ligne_budget_suggested}`);
  switchTab('mine');
}

function render() {
  renderTabs();
  let body;
  if (_currentTab === 'new') {
    body = renderForm();
  } else {
    const tab = TABS.find((t) => t.code === _currentTab);
    const items = tab.filter ? _ebAll.filter(tab.filter) : _ebAll;
    body = renderList(items, _currentTab === 'mine'
      ? 'Vous n\'avez aucun besoin en cours. Cliquez sur l\'onglet « Saisir un nouveau besoin » pour en créer un.'
      : 'Aucun besoin en attente de validation.');
  }
  document.getElementById('ebCanvas').innerHTML = body;
  const tab = TABS.find((t) => t.code === _currentTab);
  document.getElementById('bcTitle').textContent = tab.label;
  document.getElementById('paneSub').textContent = _currentTab === 'new'
    ? 'Toute opération PSLSH/IST commence par une expression de besoins.'
    : `${_ebAll.filter(tab.filter || (() => true)).length} besoin(s) · exercice 2026`;
  if (_currentTab === 'new') renderLignes();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

function boot() {
  load();
  const p = new URLSearchParams(window.location.search);
  if (p.get('action') === 'new') _currentTab = 'new';
  else if (p.get('filter') === 'pending') _currentTab = 'pending';
  else _currentTab = 'mine';
  render();
}
</script>
</body>
</html>
