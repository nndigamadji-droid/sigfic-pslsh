<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGFIC-PSLSH | Fiche dossier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../../src/css/main.css" rel="stylesheet">
  <style>
    html, body { height:100%; overflow:hidden; }
    .app-layout, .main-content { height:100vh; overflow:hidden; }
    .page-content { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0; }
    .det-body { flex:1; overflow-y:auto; padding:18px 24px 30px; background:#eef2f7; }

    .det-header {
      background:#fff; border:1px solid #e2e8f0; border-radius:12px;
      padding:18px 22px; margin-bottom:16px;
      display:grid; grid-template-columns:1fr auto; gap:16px;
    }
    .det-header h4 { margin:0 0 6px; font-size:1.08rem; font-weight:800; color:#1b2f52; }
    .det-meta { display:flex; flex-wrap:wrap; gap:18px; font-size:.78rem; color:#475569; margin-top:8px; }
    .det-meta strong { color:#1b2f52; font-weight:700; }
    .det-meta .mono { font-family:monospace; color:#1d4ed8; font-weight:700; }
    .det-amounts {
      display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
      min-width:520px;
    }
    .amt-card {
      background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px;
      padding:8px 12px;
    }
    .amt-lbl { font-size:.62rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.04em; }
    .amt-val { font-size:.95rem; font-weight:800; color:#1b2f52; font-family:monospace; margin-top:1px; }

    .det-grid { display:grid; grid-template-columns:1fr 320px; gap:16px; }
    .det-main { display:flex; flex-direction:column; gap:16px; }

    .pieces-column { display:flex; flex-direction:column; gap:10px; }

    .piece-card {
      background:#fff; border:1px solid #e2e8f0; border-left:4px solid #cbd5e1;
      border-radius:10px; overflow:hidden; transition:box-shadow .15s, border-color .15s;
    }
    .piece-card.done     { border-left-color:#15803d; }
    .piece-card.current  { border-left-color:#b45309; }
    .piece-card.rejected { border-left-color:#b91c1c; }
    .piece-card.selected { box-shadow:0 4px 14px rgba(27,58,107,.10); border-color:#1b3a6b; }

    .pc-head {
      display:grid; grid-template-columns:42px 1fr auto auto;
      align-items:center; gap:12px; padding:12px 16px;
      cursor:pointer; user-select:none;
    }
    .pc-head:hover { background:#f8fafc; }
    .pc-num {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:.85rem;
      background:#f1f5f9; color:#94a3b8;
      border:2px solid #e2e8f0;
    }
    .piece-card.done    .pc-num { background:#dcfce7; color:#15803d; border-color:#15803d; }
    .piece-card.current .pc-num { background:#fef3c7; color:#b45309; border-color:#b45309; }
    .piece-card.rejected .pc-num{ background:#fee2e2; color:#b91c1c; border-color:#b91c1c; }
    .pc-info h6 { margin:0; font-size:.88rem; font-weight:700; color:#1b2f52; }
    .pc-info .pc-sub { font-size:.7rem; color:#64748b; margin-top:2px; }
    .pc-status {
      padding:4px 10px; border-radius:14px; font-size:.66rem; font-weight:700; white-space:nowrap;
    }
    .ps-vide       { background:#f1f5f9; color:#64748b; }
    .ps-en-cours   { background:#fef3c7; color:#b45309; }
    .ps-soumis     { background:#dbeafe; color:#1d4ed8; }
    .ps-valide     { background:#dcfce7; color:#15803d; }
    .ps-rejete     { background:#fee2e2; color:#b91c1c; }
    .ps-non-applic { background:#f1f5f9; color:#94a3b8; }

    .pc-quick { display:flex; gap:4px; }
    .pc-quick button {
      width:32px; height:32px; border-radius:6px; border:1px solid #cbd5e1;
      background:#fff; color:#475569; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:.78rem; transition:all .12s;
    }
    .pc-quick button:hover { background:#1b3a6b; color:#fff; border-color:#1b3a6b; }
    .pc-quick button.imported { color:#15803d; }

    .pc-body {
      padding:14px 18px 18px; border-top:1px solid #f1f5f9; background:#fafbfc;
      display:none;
    }
    .piece-card.selected .pc-body { display:block; }
    .pc-toggle {
      width:24px; height:24px; border-radius:4px;
      display:flex; align-items:center; justify-content:center;
      color:#94a3b8; font-size:.7rem; transition:transform .2s;
    }
    .piece-card.selected .pc-toggle { transform:rotate(90deg); color:#1b3a6b; }

    .pp-fields { display:grid; grid-template-columns:1fr 1fr; gap:12px 18px; margin-bottom:14px; }
    .pp-fld label { display:block; font-size:.65rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
    .pp-fld input, .pp-fld select, .pp-fld textarea {
      width:100%; font-size:.78rem; padding:6px 10px;
      border:1px solid #cbd5e1; border-radius:7px; background:#fff;
    }
    .pp-fld textarea { min-height:60px; resize:vertical; }
    .pp-fld input:read-only { background:#f8fafc; color:#475569; }
    .pp-full { grid-column:1 / -1; }

    .pp-actions {
      display:flex; gap:8px; justify-content:flex-end;
      padding-top:14px; border-top:1px solid #f1f5f9;
    }
    .btn-act-pp {
      font-size:.76rem; font-weight:700; padding:7px 16px; border-radius:7px;
      border:1px solid; cursor:pointer; min-height:34px;
      display:inline-flex; align-items:center; gap:6px;
      transition:all .15s;
    }
    .btn-save   { background:#fff; color:#475569; border-color:#cbd5e1; }
    .btn-save:hover   { background:#f8fafc; }
    .btn-submit { background:#1b3a6b; color:#fff; border-color:#1b3a6b; }
    .btn-submit:hover { background:#254d8f; }
    .btn-validate { background:#15803d; color:#fff; border-color:#15803d; }
    .btn-validate:hover { background:#166534; }
    .btn-reject { background:#fff; color:#b91c1c; border-color:#fca5a5; }
    .btn-reject:hover { background:#fee2e2; }
    .btn-disabled { background:#f1f5f9; color:#94a3b8; border-color:#e2e8f0; cursor:not-allowed; }

    .det-aside {
      display:flex; flex-direction:column; gap:16px;
    }
    .audit-card {
      background:#fff; border:1px solid #e2e8f0; border-radius:12px;
      padding:14px 18px; max-height:480px; overflow-y:auto;
    }
    .audit-title {
      font-size:.74rem; font-weight:800; color:#1b2f52;
      text-transform:uppercase; letter-spacing:.05em; margin-bottom:12px;
    }
    .audit-item {
      display:grid; grid-template-columns:24px 1fr; gap:10px;
      padding:8px 0; border-bottom:1px dashed #f1f5f9; font-size:.74rem;
    }
    .audit-item:last-child { border-bottom:none; }
    .audit-dot {
      width:10px; height:10px; border-radius:50%; margin-top:4px;
      background:#cbd5e1;
    }
    .audit-dot.green  { background:#15803d; }
    .audit-dot.orange { background:#b45309; }
    .audit-dot.red    { background:#b91c1c; }
    .audit-dot.blue   { background:#1d4ed8; }
    .audit-action { font-weight:700; color:#1b2f52; }
    .audit-meta { color:#64748b; font-size:.68rem; margin-top:1px; }

    .pieces-summary {
      background:#fff; border:1px solid #e2e8f0; border-radius:12px;
      padding:14px 18px;
    }
    .pcs-row {
      display:grid; grid-template-columns:auto 1fr auto; gap:10px;
      padding:7px 0; align-items:center; font-size:.76rem;
      border-bottom:1px dashed #f1f5f9; cursor:pointer;
    }
    .pcs-row:hover { background:#f8fafc; }
    .pcs-row:last-child { border-bottom:none; }
    .pcs-num {
      width:22px; height:22px; border-radius:50%;
      background:#f1f5f9; color:#64748b;
      display:flex; align-items:center; justify-content:center;
      font-size:.65rem; font-weight:800;
    }
    .pcs-row.done .pcs-num    { background:#dcfce7; color:#15803d; }
    .pcs-row.current .pcs-num { background:#fef3c7; color:#b45309; }
    .pcs-name { font-weight:600; color:#1b2f52; }
    .pcs-row.locked .pcs-name { color:#94a3b8; font-weight:500; }
    .pcs-mini-status {
      font-size:.62rem; font-weight:700; padding:1px 7px; border-radius:10px;
      background:#f1f5f9; color:#64748b;
    }
    .pcs-row.done .pcs-mini-status    { background:#dcfce7; color:#15803d; }
    .pcs-row.current .pcs-mini-status { background:#fef3c7; color:#b45309; }
    .pcs-row.rejected .pcs-mini-status{ background:#fee2e2; color:#b91c1c; }

    .stub-notice {
      background:#fffbeb; border:1px solid #fde68a; border-radius:10px;
      padding:14px 18px; color:#92400e; font-size:.82rem; line-height:1.6;
    }
    .stub-notice strong { color:#78350f; }
    .provisoire-banner {
      background:#fef3c7; border:1px solid #fde68a; border-left:4px solid #b45309;
      border-radius:8px; padding:10px 14px; margin-bottom:14px;
      font-size:.78rem; color:#92400e; display:flex; align-items:center; gap:10px;
    }
    .provisoire-banner i { color:#b45309; font-size:1rem; }
    .provisoire-banner strong { color:#78350f; }

    @media print {
      .sidebar, .topbar, .det-aside, .pc-quick, .pp-actions, .provisoire-banner,
      .piece-card .pc-toggle, .breadcrumb { display:none !important; }
      .det-body { padding:0; background:#fff; }
      .det-header { box-shadow:none; }
      .piece-card { box-shadow:none; border:1px solid #1b3a6b; page-break-inside:avoid; margin-bottom:12px; }
      .piece-card:not(.print-target) { display:none; }
      .pc-body { display:block !important; background:#fff; }
      .det-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

let _piecesData = {};
let _selectedPiece = null;

function $id(id) { return document.getElementById(id); }

function loadAll() {
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { renderError('Aucun identifiant de dossier fourni dans l\'URL.'); return; }

    let dossiers = [];
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_DOSSIERS) || '[]');
      dossiers = Array.isArray(raw) ? raw : [];
    } catch (_) { dossiers = []; }

    _dossier = dossiers.find((d) => d.id === id);
    if (!_dossier) { renderNotFound(id); return; }

    try {
      const rawP = JSON.parse(localStorage.getItem(STORAGE_PIECES) || '{}');
      _piecesData = (rawP && typeof rawP === 'object' && !Array.isArray(rawP)) ? rawP : {};
    } catch (_) { _piecesData = {}; }
    if (!_piecesData[id]) _piecesData[id] = { pieces: {}, histo: [] };

    autoGeneratePieces();

    $id('bcRef').textContent = _dossier.id;
    render();
  } catch (err) {
    console.error('Erreur loadAll:', err);
    renderError(`Erreur lors du chargement : <code>${err.message}</code><br><small>${(err.stack || '').split('\n').slice(0, 3).join('<br>')}</small>`);
  }
}

function renderNotFound(id) {
  $id('detBody').innerHTML = `<div class="stub-notice" style="background:#fef3c7;border-color:#fde68a;color:#92400e">
    <strong>Dossier ${id} introuvable.</strong><br><br>
    Votre stockage local ne contient pas (ou plus) ce dossier. Cela arrive après une mise à jour
    du moteur de la page liste.<br><br>
    <button class="btn btn-sm btn-warning" onclick="resetStorage()">
      <i class="fas fa-redo me-1"></i>Réinitialiser le stockage local des dossiers
    </button>
    &nbsp;
    <a href="index.html" class="btn btn-sm btn-outline-secondary">
      <i class="fas fa-arrow-left me-1"></i>Retour à la liste
    </a>
  </div>`;
}

function resetStorage() {
  if (!confirm('Cette action supprime toutes les données locales de dossiers, pièces et expressions de besoin. Continuer ?')) return;
  ['pslsh_dossiers_v1', 'pslsh_pieces_v1', 'pslsh_eb_v1'].forEach((k) => localStorage.removeItem(k));
  window.location.href = 'index.html';
}

function autoGeneratePieces() {
  const list = PIECES_BY_TYPE[_dossier.type];
  if (!list) return;
  const bucket = _piecesData[_dossier.id];
  let generated = 0;
  list.forEach((piece, i) => {
    if (bucket.pieces[piece.code]) return;
    bucket.pieces[piece.code] = seedPiece(piece, i);
    generated++;
  });
  if (generated > 0) {
    bucket.histo.push({
      action: `${generated} pièce${generated > 1 ? 's' : ''} générée${generated > 1 ? 's' : ''} automatiquement à l'ouverture du dossier`,
      par: 'Système', date: new Date().toLocaleString('fr-FR'), color: 'blue',
    });
    savePieces();
  }
}

function seedPiece(piece, idx) {
  const d = _dossier;
  const refSeq = String(idx + 1).padStart(3, '0');
  const stamp = d.id.slice(-7);
  const refPrefix = {
    EB:'EB', PROFORMA:'PRF', BC:'BC', FACTURE:'FAC', BL:'BL', PV_RECEP:'PV', ATT_SF:'ASF',
    OP:'OP', OV:'OV',
    CDC:'CDC', DC:'DC', OFFRES:'OFR', TC:'TC', PV_ATTR:'PVA', CONTRAT:'CT', NOTIF:'NOT',
    TDR:'TDR', PLAN:'PLN', LISTE:'LST', CONVOC:'CV', ETAT_PEC:'PEC', FEUILLE:'PRS',
    RAPPORT:'RAP', JUSTIFS:'JUS',
    DECISION:'DEC', ETAT_NOM:'EN', CALCUL:'CAL', VALID_RH:'VRH', BORD_PAIE:'BP', PV_REMISE:'PVR',
  };
  const fournDefault = guessFournisseur(d);
  const seedFields = {
    designation:       d.objet,
    quantite:          '1',
    prix_unitaire:     String(d.montant_estime || 0),
    justification:     `Besoin exprimé par ${d.porteur} (${d.service}) le ${d.soumis}.`,
    fournisseur:       fournDefault,
    reference:         `${refPrefix[piece.code] || piece.code}-${stamp}-${refSeq}`,
    montant_ttc:       String(d.montant_estime || 0),
    date_doc:          toISO(d.soumis),
    date_echeance:     addDaysISO(d.soumis, 30),
    delai_livraison:   '30 jours',
    transporteur:      'À renseigner',
    lieu:              'Magasin central PSLSH',
    observations:      '',
    etat_marchandise:  'Conforme au bon de commande',
    signataire:        d.porteur,
    beneficiaire:      fournDefault,
    mode_paiement:     d.montant_estime >= 600000 ? 'Virement' : 'Chèque',
    banque:            'BCC — Banque Comm. du Tchad',
    compte:            'TCH-014-22001-' + d.id.slice(-5),

    specifications:    'Spécifications techniques à compléter selon catalogue de référence.',
    criteres_eligibilite: 'Capacité technique, références antérieures, garanties financières.',
    date_limite:       addDaysISO(d.soumis, 21),
    soumissionnaires_invites: 'À renseigner (3 minimum)',
    nb_offres_recues:  '0',
    commission:        'Commission de passation des marchés PSLSH/IST',
    attributaire:      '',
    montant_attribue:  String(d.montant_estime || 0),
    motif_choix:       'Offre conforme aux critères, mieux disante.',
    duree:             '12 mois',
    garanties:         'Caution de bonne exécution 5%',
    date_demarrage:    addDaysISO(d.soumis, 45),

    objectifs:         `Objectifs liés à : ${d.objet}`,
    resultats_attendus:'Compétences acquises mesurables et applicables.',
    public_cible:      `Personnel ${d.service}`,
    periode:           `${toISO(d.soumis)} → ${addDaysISO(d.soumis, 5)}`,
    formateurs:        'À désigner',
    nb_participants:   '20',
    services_representes: d.service,
    per_diem:          '25 000',
    transport:         '15 000',
    hebergement:       '40 000',
    taux_presence:     '100',
    redacteur:         d.porteur,
    synthese:          'À compléter à l\'issue de l\'activité.',
    recommandations:   'À compléter.',
    nb_pieces:         '0',
    montant_justifie:  String(d.montant_estime || 0),

    motif_decision:    `Décision liée à : ${d.objet}`,
    nb_beneficiaires:  '1',
    base_calcul:       'Forfaitaire',
    montant_unitaire:  String(d.montant_estime || 0),
  };
  const data = { status: 'en-cours' };
  piece.fields.forEach((f) => { data[f] = seedFields[f] !== undefined ? seedFields[f] : ''; });
  return data;
}

function guessFournisseur(d) {
  const map = {
    'Réactifs dépistage VIH':      'CPA — Centrale Pharmaceutique',
    'Réactifs charge virale VIH':  'ROCHE DIAGNOSTICS',
    'Médicaments ARV':             'CPA — Centrale Pharmaceutique',
    'Carburant':                   'TOTAL ENERGIES TCHAD',
    'Fournitures':                 'SOUARA COMMERCIAL',
    'gardiennage':                 'SECURIMAX SARL',
  };
  const objet = (d.objet || '').toLowerCase();
  const hit = Object.keys(map).find((k) => objet.includes(k.toLowerCase()));
  return hit ? map[hit] : 'À désigner';
}

function toISO(frDate) {
  const m = (frDate || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
}

function addDaysISO(frDate, days) {
  const iso = toISO(frDate);
  if (!iso) return '';
  const d = new Date(iso);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function savePieces() { localStorage.setItem(STORAGE_PIECES, JSON.stringify(_piecesData)); }
function saveDossiers() {
  const all = JSON.parse(localStorage.getItem(STORAGE_DOSSIERS) || '[]');
  const idx = all.findIndex((d) => d.id === _dossier.id);
  if (idx >= 0) { all[idx] = _dossier; localStorage.setItem(STORAGE_DOSSIERS, JSON.stringify(all)); }
}

function fmt(n) { return Math.round(n).toLocaleString('fr-FR'); }

function statusOfPiece(code) {
  const p = _piecesData[_dossier.id].pieces[code];
  if (!p) return 'vide';
  return p.status || 'en-cours';
}

function pieceProgress() {
  const list = PIECES_BY_TYPE[_dossier.type];
  if (!list) return { idx: 0, total: 0 };
  let firstOpen = list.length;
  for (let i = 0; i < list.length; i++) {
    const st = statusOfPiece(list[i].code);
    if (st !== 'valide' && st !== 'non-applic') { firstOpen = i; break; }
  }
  return { idx: firstOpen, total: list.length };
}

function renderError(msg) {
  $id('detBody').innerHTML = `<div class="stub-notice" style="background:#fee2e2;border-color:#fca5a5;color:#991b1b">
    <strong>Erreur :</strong> ${msg}
    <div class="mt-2"><a href="index.html" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Retour à la liste</a></div>
  </div>`;
}

function render() {
  if (!PIECES_BY_TYPE[_dossier.type]) { renderStub(); return; }
  if (!_selectedPiece) _selectedPiece = PIECES_BY_TYPE[_dossier.type][pieceProgress().idx]?.code || PIECES_BY_TYPE[_dossier.type][0].code;

  const notice = TYPE_NOTICE[_dossier.type]
    ? `<div class="provisoire-banner">
         <i class="fas fa-exclamation-triangle"></i>
         <div><strong>${TYPE_LABEL[_dossier.type]} — circuit provisoire :</strong> ${TYPE_NOTICE[_dossier.type]} Les pièces et leur ordre sont à valider par les services concernés.</div>
       </div>`
    : '';

  $id('detBody').innerHTML = `
    ${renderHeader()}
    ${notice}
    <div class="det-grid">
      <div class="det-main">
        ${renderPiecesColumn()}
      </div>
      <div class="det-aside">
        ${renderPiecesSummary()}
        ${renderAudit()}
      </div>
    </div>
  `;
}

function renderHeader() {
  return `<div class="det-header">
    <div>
      <h4><i class="fas fa-folder-open me-2" style="color:#1b3a6b"></i>${_dossier.objet}</h4>
      <div class="det-meta">
        <span><span class="mono">${_dossier.id}</span></span>
        <span>Famille : <strong>${_dossier.type}</strong></span>
        <span>Service : <strong>${_dossier.service}</strong></span>
        <span>Porteur : <strong>${_dossier.porteur}</strong></span>
        <span>Ligne : <strong style="font-family:monospace;color:#475569">${_dossier.ligne}</strong></span>
        <span>Source : <strong style="font-family:monospace;color:#1d4ed8">${_dossier.source}</strong></span>
        <span>Soumis : <strong>${_dossier.soumis}</strong></span>
      </div>
    </div>
    <div class="det-amounts">
      <div class="amt-card"><div class="amt-lbl">Estimé</div><div class="amt-val">${fmt(_dossier.montant_estime)}</div></div>
      <div class="amt-card"><div class="amt-lbl">Engagé</div><div class="amt-val" style="color:#1d4ed8">${fmt(_dossier.montant_engage)}</div></div>
      <div class="amt-card"><div class="amt-lbl">Liquidé</div><div class="amt-val" style="color:#6d28d9">${fmt(_dossier.montant_engage)}</div></div>
      <div class="amt-card"><div class="amt-lbl">Payé</div><div class="amt-val" style="color:#15803d">${fmt(_dossier.montant_paye)}</div></div>
    </div>
  </div>`;
}

const STATUS_MAP = {
  'vide':       { cls:'ps-vide',       txt:'À renseigner' },
  'en-cours':   { cls:'ps-en-cours',   txt:'En cours de saisie' },
  'soumis':     { cls:'ps-soumis',     txt:'Soumis pour validation' },
  'valide':     { cls:'ps-valide',     txt:'Validée' },
  'rejete':     { cls:'ps-rejete',     txt:'Rejetée' },
  'non-applic': { cls:'ps-non-applic', txt:'Sans objet' },
};

function renderPiecesColumn() {
  const list = PIECES_BY_TYPE[_dossier.type];
  const prog = pieceProgress();
  const cards = list.map((p, i) => renderPieceCard(p, i, prog)).join('');
  return `<div class="pieces-column">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 4px 4px">
      <div style="font-size:.74rem;font-weight:800;color:#1b2f52;text-transform:uppercase;letter-spacing:.05em">
        <i class="fas fa-folder-open me-2" style="color:#1b3a6b"></i>Circuit des pièces · ${prog.idx}/${prog.total} validées
      </div>
      <button class="btn-act-pp btn-save" style="font-size:.72rem;padding:5px 12px" onclick="printAll()">
        <i class="fas fa-print"></i>Imprimer tout le dossier
      </button>
    </div>
    ${cards}
  </div>`;
}

function renderPieceCard(piece, idx, prog) {
  const data = _piecesData[_dossier.id].pieces[piece.code] || {};
  const status = data.status || 'vide';
  const s = STATUS_MAP[status];
  let cls = 'piece-card';
  if (status === 'valide')      cls += ' done';
  else if (status === 'rejete') cls += ' rejected';
  else if (idx === prog.idx)    cls += ' current';
  if (piece.code === _selectedPiece) cls += ' selected';

  return `<div class="${cls}" id="card-${piece.code}">
    <div class="pc-head" onclick="selectPiece('${piece.code}')">
      <div class="pc-num">${status === 'valide' ? '<i class="fas fa-check"></i>' : status === 'rejete' ? '<i class="fas fa-times"></i>' : idx + 1}</div>
      <div class="pc-info">
        <h6><i class="fas ${piece.icon} me-2" style="color:#1b3a6b"></i>${piece.label}</h6>
        <div class="pc-sub">Pièce ${idx + 1}/${PIECES_BY_TYPE[_dossier.type].length} · ${data.reference || 'sans référence'}</div>
      </div>
      <div class="pc-quick" onclick="event.stopPropagation()">
        <button title="Générer le document" onclick="generatePiece('${piece.code}')"><i class="fas fa-magic"></i></button>
        <button title="Importer un fichier" onclick="importPiece('${piece.code}')" class="${data.imported ? 'imported' : ''}"><i class="fas fa-${data.imported ? 'check-circle' : 'upload'}"></i></button>
        <button title="Imprimer cette pièce" onclick="printPiece('${piece.code}')"><i class="fas fa-print"></i></button>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="pc-status ${s.cls}">${s.txt}</span>
        <div class="pc-toggle"><i class="fas fa-chevron-right"></i></div>
      </div>
    </div>
    ${piece.code === _selectedPiece ? renderPieceBody(piece, data, status) : ''}
  </div>`;
}

function renderPieceBody(piece, data, status) {
  const locked = status === 'valide';
  const ro = locked ? 'readonly' : '';
  const fields = piece.fields.map((f) => {
    const lbl = FIELD_LABELS[f] || f;
    const v = data[f] != null ? String(data[f]) : '';
    const isText = ['justification', 'observations', 'specifications', 'criteres_eligibilite',
                    'soumissionnaires_invites', 'motif_choix', 'motif_decision', 'objectifs',
                    'resultats_attendus', 'synthese', 'recommandations', 'garanties'].includes(f);
    const isDate = f.startsWith('date_');
    const isNum  = ['quantite', 'prix_unitaire', 'montant_ttc', 'montant_attribue',
                    'nb_participants', 'nb_offres_recues', 'nb_beneficiaires', 'nb_pieces',
                    'per_diem', 'transport', 'hebergement', 'taux_presence', 'montant_unitaire',
                    'montant_justifie'].includes(f);
    const fullCol = isText ? ' pp-full' : '';
    const inp = isText
      ? `<textarea ${ro}>${v}</textarea>`
      : `<input type="${isDate ? 'date' : isNum ? 'number' : 'text'}" value="${v.replace(/"/g, '&quot;')}" ${ro}>`;
    return `<div class="pp-fld${fullCol}"><label>${lbl}</label>${inp}</div>`;
  }).join('');

  const actions = locked
    ? `<button class="btn-act-pp btn-disabled" disabled><i class="fas fa-lock"></i>Pièce validée</button>`
    : status === 'rejete'
      ? `<button class="btn-act-pp btn-save" onclick="reopenPiece()"><i class="fas fa-redo"></i>Reprendre</button>`
      : status === 'soumis'
        ? `<button class="btn-act-pp btn-reject" onclick="rejectPiece()"><i class="fas fa-times"></i>Rejeter</button>
           <button class="btn-act-pp btn-validate" onclick="validatePiece()"><i class="fas fa-check"></i>Valider</button>`
        : `<button class="btn-act-pp btn-save" onclick="savePiece(false)"><i class="fas fa-save"></i>Enregistrer</button>
           <button class="btn-act-pp btn-submit" onclick="savePiece(true)"><i class="fas fa-paper-plane"></i>Soumettre pour validation</button>`;

  return `<div class="pc-body">
    <form id="pieceForm" onsubmit="event.preventDefault();savePiece(false)">
      <div class="pp-fields">${fields}</div>
      <div class="pp-actions">${actions}</div>
    </form>
  </div>`;
}

function renderPiecesSummary() {
  const list = PIECES_BY_TYPE[_dossier.type];
  const prog = pieceProgress();
  return `<div class="pieces-summary">
    <div class="audit-title">Pièces du dossier (${prog.idx}/${prog.total})</div>
    ${list.map((p, i) => {
      const st = statusOfPiece(p.code);
      let cls = 'pcs-row';
      if (st === 'valide')       cls += ' done';
      else if (st === 'rejete')  cls += ' rejected';
      else if (i === prog.idx)   cls += ' current';
      else if (i > prog.idx)     cls += ' locked';
      const stTxt = { vide:'—', 'en-cours':'En cours', soumis:'Soumis', valide:'Validée', rejete:'Rejetée' }[st] || '—';
      return `<div class="${cls}" onclick="selectPiece('${p.code}')">
        <div class="pcs-num">${i + 1}</div>
        <div class="pcs-name">${p.label}</div>
        <div class="pcs-mini-status">${stTxt}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAudit() {
  const histo = _piecesData[_dossier.id].histo;
  return `<div class="audit-card">
    <div class="audit-title">Journal d'audit</div>
    ${histo.length === 0
      ? `<div style="text-align:center;color:#94a3b8;font-size:.75rem;padding:14px 0">Aucune action enregistrée</div>`
      : histo.slice().reverse().map((h) => `
          <div class="audit-item">
            <div class="audit-dot ${h.color || 'blue'}"></div>
            <div>
              <div class="audit-action">${h.action}</div>
              <div class="audit-meta">${h.piece || ''} · ${h.par} · ${h.date}</div>
              ${h.motif ? `<div class="audit-meta" style="color:#b91c1c">Motif : ${h.motif}</div>` : ''}
            </div>
          </div>`).join('')}
  </div>`;
}

function renderStub() {
  $id('detBody').innerHTML = `
    ${renderHeader()}
    <div class="stub-notice">
      <strong>Famille inconnue : « ${_dossier.type} ».</strong> Ce type d'opération n'est pas reconnu par le moteur.
    </div>`;
}

function selectPiece(code) {
  _selectedPiece = code;
  render();
  setTimeout(() => {
    const el = document.getElementById('card-' + code);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 30);
}

function generatePiece(code) {
  const list = PIECES_BY_TYPE[_dossier.type];
  const piece = list.find((p) => p.code === code);
  const idx = list.findIndex((p) => p.code === code);
  if (!piece) return;
  const fresh = seedPiece(piece, idx);
  const existing = _piecesData[_dossier.id].pieces[code] || {};
  fresh.status = existing.status === 'valide' ? 'valide' : 'en-cours';
  fresh.imported = existing.imported;
  _piecesData[_dossier.id].pieces[code] = fresh;
  _piecesData[_dossier.id].histo.push({
    action: `Document « ${piece.label} » régénéré automatiquement`,
    par: 'Système', date: new Date().toLocaleString('fr-FR'), color: 'blue',
  });
  savePieces();
  _selectedPiece = code;
  render();
}

function importPiece(code) {
  const list = PIECES_BY_TYPE[_dossier.type];
  const piece = list.find((p) => p.code === code);
  if (!piece) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const current = _piecesData[_dossier.id].pieces[code] || { status: 'en-cours' };
    current.imported = {
      filename: file.name,
      size: file.size,
      type: file.type,
      importedAt: new Date().toISOString(),
    };
    if (!current.status || current.status === 'vide') current.status = 'en-cours';
    _piecesData[_dossier.id].pieces[code] = current;
    _piecesData[_dossier.id].histo.push({
      action: `Pièce jointe importée : ${file.name} (${Math.round(file.size / 1024)} ko)`,
      piece: code, par: 'admin@pslsh.org',
      date: new Date().toLocaleString('fr-FR'), color: 'green',
    });
    savePieces();
    render();
  };
  input.click();
}

function printPiece(code) {
  document.querySelectorAll('.piece-card').forEach((el) => el.classList.remove('print-target'));
  const card = document.getElementById('card-' + code);
  if (card) {
    card.classList.add('print-target');
    if (code !== _selectedPiece) { _selectedPiece = code; render(); setTimeout(() => printPiece(code), 50); return; }
  }
  window.print();
  setTimeout(() => card && card.classList.remove('print-target'), 800);
}

function printAll() {
  document.querySelectorAll('.piece-card').forEach((el) => el.classList.add('print-target'));
  window.print();
  setTimeout(() => document.querySelectorAll('.piece-card').forEach((el) => el.classList.remove('print-target')), 800);
}

function logHisto(action, color, motif) {
  _piecesData[_dossier.id].histo.push({
    action, piece: _selectedPiece,
    par: 'admin@pslsh.org', date: new Date().toLocaleString('fr-FR'),
    color, motif,
  });
}

function readFields() {
  const piece = PIECES_BY_TYPE[_dossier.type].find((p) => p.code === _selectedPiece);
  const data = {};
  document.querySelectorAll('#pieceForm .pp-fld').forEach((wrap, i) => {
    const input = wrap.querySelector('input, textarea');
    if (input && piece.fields[i]) data[piece.fields[i]] = input.value;
  });
  return data;
}

function savePiece(submit) {
  const data = readFields();
  data.status = submit ? 'soumis' : 'en-cours';
  _piecesData[_dossier.id].pieces[_selectedPiece] = data;
  logHisto(submit ? 'Soumis pour validation' : 'Enregistré', submit ? 'orange' : 'blue');
  savePieces();
  render();
}

function validatePiece() {
  const p = _piecesData[_dossier.id].pieces[_selectedPiece] || {};
  p.status = 'valide';
  p.validatedAt = new Date().toISOString();
  _piecesData[_dossier.id].pieces[_selectedPiece] = p;
  logHisto('Validée', 'green');
  syncDossierEtape();
  savePieces();
  saveDossiers();
  const list = PIECES_BY_TYPE[_dossier.type];
  const idx = list.findIndex((x) => x.code === _selectedPiece);
  if (idx >= 0 && idx < list.length - 1) _selectedPiece = list[idx + 1].code;
  render();
}

function rejectPiece() {
  const motif = prompt('Motif du rejet :');
  if (!motif) return;
  const p = _piecesData[_dossier.id].pieces[_selectedPiece] || {};
  p.status = 'rejete';
  p.motif = motif;
  _piecesData[_dossier.id].pieces[_selectedPiece] = p;
  logHisto('Rejetée', 'red', motif);
  savePieces();
  render();
}

function reopenPiece() {
  const p = _piecesData[_dossier.id].pieces[_selectedPiece] || {};
  p.status = 'en-cours';
  delete p.motif;
  _piecesData[_dossier.id].pieces[_selectedPiece] = p;
  logHisto('Reprise', 'blue');
  savePieces();
  render();
}

function syncDossierEtape() {
  const list = PIECES_BY_TYPE[_dossier.type];
  if (!list) return;
  const prog = pieceProgress();
  if (prog.idx >= list.length) { _dossier.etape = 'clos'; return; }
  const ratio = prog.idx / list.length;
  if (ratio < 0.15)      _dossier.etape = 'saf';
  else if (ratio < 0.3)  _dossier.etape = 'compta';
  else if (ratio < 0.45) _dossier.etape = 'coordo';
  else if (ratio < 0.6)  _dossier.etape = 'engagement';
  else if (ratio < 0.85) _dossier.etape = 'reception';
  else                   _dossier.etape = 'paiement';
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadAll);
} else {
  loadAll();
}
</script>
</body>
</html>
