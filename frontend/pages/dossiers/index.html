<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGFIC-PSLSH | Dossiers d'opération</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../../src/css/main.css" rel="stylesheet">
  <style>
    html, body { height:100%; overflow:hidden; }
    .app-layout, .main-content { height:100vh; overflow:hidden; }
    .page-content { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0; }

    .dos-top { flex-shrink:0; padding:12px 24px 8px; background:#fff; border-bottom:1px solid #e2e8f0; }
    .dos-title-row { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; }
    .dos-title-row h5 { margin:0; font-size:.96rem; font-weight:800; color:#1b2f52; }
    .dos-title-row small { font-size:.7rem; color:#64748b; }

    .dos-body { flex:1; overflow:hidden; display:flex; flex-direction:column; background:#eef2f7; }
    .dos-canvas { flex:1; overflow-y:auto; padding:14px 24px; }

    .dos-filter {
      background:#fff; border:1px solid #e2e8f0; border-radius:10px;
      padding:10px 14px; margin-bottom:12px;
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    .dos-filter input, .dos-filter select {
      font-size:.76rem; padding:5px 10px; height:32px;
      border:1px solid #cbd5e1; border-radius:7px; background:#fff;
    }
    .btn-new {
      font-size:.75rem; font-weight:700; padding:6px 14px; min-height:32px;
      background:#1b3a6b; color:#fff; border:none; border-radius:7px;
      display:inline-flex; align-items:center; gap:6px; cursor:pointer; margin-left:auto;
    }
    .btn-new:hover { background:#254d8f; }

    .dos-tbl { width:100%; border-collapse:collapse; font-size:.79rem;
      background:#fff; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; }
    .dos-tbl thead th {
      background:#f1f5f9; color:#1b2f52;
      font-size:.69rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.03em; padding:10px 12px;
      border-bottom:2px solid #e2e8f0; text-align:left; white-space:nowrap;
      position:sticky; top:0;
    }
    .dos-tbl tbody td { padding:9px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .dos-tbl tbody tr { cursor:pointer; }
    .dos-tbl tbody tr:hover td { background:#eff6ff; transition:background .1s; }
    .dos-tbl .mono { font-family:monospace; color:#1d4ed8; font-weight:700; font-size:.75rem; }
    .dos-tbl .num  { font-family:monospace; text-align:right; font-feature-settings:'tnum' 1; }

    .badge-type {
      display:inline-block; padding:2px 8px; border-radius:6px;
      font-size:.66rem; font-weight:700; white-space:nowrap;
    }
    .bt-ACH-S { background:#fef3c7; color:#92400e; }
    .bt-ACH-P { background:#e0e7ff; color:#3730a3; }
    .bt-FOR-M { background:#ccfbf1; color:#0f766e; }
    .bt-PER-A { background:#fce7f3; color:#9d174d; }

    .etape-pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 9px; border-radius:18px; font-size:.66rem; font-weight:700; white-space:nowrap;
    }
    .e-brouillon { background:#f1f5f9; color:#64748b; }
    .e-saf       { background:#dbeafe; color:#1d4ed8; }
    .e-compta    { background:#fef3c7; color:#b45309; }
    .e-coordo    { background:#dcfce7; color:#15803d; }
    .e-engagement{ background:#ede9fe; color:#6d28d9; }
    .e-reception { background:#cffafe; color:#0e7490; }
    .e-paiement  { background:#fed7aa; color:#c2410c; }
    .e-clos      { background:#1b3a6b; color:#fff; }
    .e-rejete    { background:#fee2e2; color:#b91c1c; }

    /* ── Positionnement dynamique du dossier ── */
    .pos-cell { display:flex; flex-direction:column; gap:4px; min-width:200px; }
    .pos-stages { display:flex; align-items:center; gap:2px; }
    .pos-node {
      flex:1; height:6px; border-radius:3px; background:#e2e8f0;
      transition:background .2s;
    }
    .pos-node.done    { background:#15803d; }
    .pos-node.current { background:#b45309; animation:pulse 1.6s ease-in-out infinite; }
    .pos-node.rejected{ background:#b91c1c; }
    .pos-meta { display:flex; justify-content:space-between; align-items:center; font-size:.65rem; color:#64748b; }
    .pos-meta strong { color:#1b2f52; font-weight:700; }
    .pos-actor { color:#b45309; font-weight:700; font-size:.65rem; }
    .pos-actor.done { color:#15803d; }
    .pos-actor.rejected { color:#b91c1c; }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%     { opacity:.45; }
    }

    .empty {
      text-align:center; padding:60px 20px; color:#94a3b8;
      background:#fff; border:1px dashed #e2e8f0; border-radius:12px;
    }
    .empty i { font-size:2.5rem; margin-bottom:12px; opacity:.5; }

    /* ── Onglets Excel-style en haut du canvas ── */
    .sheet-tabs {
      flex-shrink:0; display:flex; align-items:flex-end; gap:0;
      background:#dbe1ea; border-bottom:1px solid #94a3b8;
      padding:6px 16px 0; min-height:36px;
      overflow-x:auto; overflow-y:hidden;
    }
    .sheet-tab {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 18px;
      font-size:.78rem; font-weight:600; color:#475569;
      background:#cbd3dd; border:1px solid #94a3b8; border-top:none;
      border-radius:4px 4px 0 0;
      cursor:pointer; user-select:none; white-space:nowrap;
      position:relative; bottom:-1px;
      transition:background .15s;
    }
    .sheet-tab:hover { background:#dee3eb; }
    .sheet-tab.active {
      background:#eef2f7; color:#1b3a6b; font-weight:800;
      border-bottom:2px solid #15803d;
      box-shadow:0 2px 4px rgba(0,0,0,.04);
      padding-bottom:6px; bottom:-1px;
      z-index:2;
    }
    .sheet-tab .count {
      background:rgba(27,58,107,.10); color:#1b3a6b;
      font-size:.65rem; padding:1px 7px; border-radius:10px;
      font-family:monospace; font-weight:700;
    }
    .sheet-tab.active .count { background:#dcfce7; color:#15803d; }
    .sheet-tabs-actions {
      margin-left:auto; display:flex; gap:4px; align-items:center; padding:0 0 4px;
    }
    .sheet-nav-btn {
      width:24px; height:24px; border:none; background:transparent;
      color:#475569; cursor:pointer; border-radius:4px; font-size:.7rem;
    }
    .sheet-nav-btn:hover { background:rgba(0,0,0,.05); color:#1b3a6b; }
  </style>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/logo/logo-pslsh.png" alt="SIGFIC-PSLSH" class="brand-logo">
      <div class="brand-text">
        <div class="brand-name">SIGFIC-PSLSH</div>
        <div class="brand-sub">Gestion Financière</div>
      </div>
    </div>
    <div id="sidebarServiceBadge"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="sf-version">SIGFIC-PSLSH v2.0</div></div>
  </aside>

  <div class="main-content">

    <div class="topbar">
      <div class="topbar-left">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item text-muted">Opérations</li>
            <li class="breadcrumb-item active fw-semibold" id="bcTitle">Dossiers d'opération</li>
          </ol>
        </nav>
      </div>
      <div class="topbar-center">
        <i class="fas fa-folder-open me-1"></i>Exercice <strong>2026</strong>
      </div>
      <div class="topbar-right">
        <div class="topbar-notif"><i class="fas fa-bell"></i><span class="notif-dot"></span></div>
        <div class="dropdown">
          <button class="btn btn-sm btn-light dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--c-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700" id="userAvatar">?</div>
            <span id="userName" style="font-size:.82rem;font-weight:600"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../admin/profile.html"><i class="fas fa-user me-2"></i>Mon profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="btnLogout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
    </div>

    <div class="page-content">

      <div class="dos-top">
        <div class="dos-title-row">
          <div>
            <h5 id="paneTitle"><i class="fas fa-folder-open me-2" style="color:#1b3a6b"></i>Dossiers d'opération</h5>
            <small id="paneSub">Vue consolidée des dossiers d'opération PSLSH/IST · exercice 2026</small>
          </div>
        </div>
      </div>

      <div class="dos-body">

        <div class="sheet-tabs" id="sheetTabs"></div>

        <div class="dos-canvas">

          <div class="dos-filter">
            <input type="text" id="fSearch" oninput="render()" placeholder="Rechercher (n°, objet, porteur…)" style="min-width:240px">
            <select id="fEtape" onchange="render()">
              <option value="">Toutes étapes</option>
              <option value="brouillon">Brouillon</option>
              <option value="saf">SAF — Conformité</option>
              <option value="compta">Comptable — Budget</option>
              <option value="coordo">Coordonnateur</option>
              <option value="engagement">Engagement</option>
              <option value="reception">Réception</option>
              <option value="paiement">Paiement</option>
              <option value="clos">Clôturé</option>
              <option value="rejete">Rejeté</option>
            </select>
            <select id="fService" onchange="render()">
              <option value="">Tous services</option>
            </select>
            <button class="btn-new" onclick="window.location.href='besoins.html?action=new'">
              <i class="fas fa-plus"></i>Nouveau dossier
            </button>
          </div>

          <div id="dossierTable"></div>

        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../src/js/api.js"></script>
<script src="../../src/js/roles.js"></script>
<script>
const STORAGE_KEY = 'pslsh_dossiers_v1';

const FAMILIES = [
  { code:'',      label:'Tous les dossiers',     icon:'fa-list',             color:'#1b3a6b' },
  { code:'ACH-S', label:'Achat simple',          icon:'fa-shopping-cart',    color:'#b45309' },
  { code:'ACH-P', label:'Achat par passation',   icon:'fa-gavel',            color:'#3730a3' },
  { code:'FOR-M', label:'Formation & missions',  icon:'fa-graduation-cap',   color:'#0f766e' },
  { code:'PER-A', label:'Personnel & assistance',icon:'fa-hand-holding-usd', color:'#9d174d' },
];

const SERVICES = ['SAF','SGAS','SPCH','SPCG','SESRO','APMS','SEB','SPSAC','SC','SLNR'];

const DEFAULT_DOSSIERS = [
  { id:'DOS-2026-0001', type:'ACH-S', objet:'Fournitures bureau et matériels informatiques',     service:'SAF',   porteur:'Resp. SAF',  ligne:'L-SAF-045',  source:'PSLSH-035', montant_estime: 30280000, montant_engage:28650000, montant_paye:28650000, etape:'clos',      soumis:'10/01/2026' },
  { id:'DOS-2026-0002', type:'ACH-P', objet:'Réactifs dépistage VIH — algorithme 3 tests',        service:'APMS',  porteur:'Chef APMS',  ligne:'L-APMS-032', source:'PSLSH-032', montant_estime:248000000, montant_engage:212000000, montant_paye:106000000, etape:'paiement', soumis:'15/01/2026' },
  { id:'DOS-2026-0003', type:'ACH-S', objet:'Service gardiennage et nettoyage locaux PSLSH',      service:'SAF',   porteur:'Resp. SAF',  ligne:'L-SAF-047',  source:'PSLSH-035', montant_estime:  6900000, montant_engage: 6900000, montant_paye: 1725000, etape:'paiement', soumis:'20/01/2026' },
  { id:'DOS-2026-0004', type:'ACH-P', objet:'Cartouches GeneXpert HBV Viral Load',                 service:'APMS',  porteur:'Chef APMS',  ligne:'L-APMS-033', source:'PSLSH-033', montant_estime: 38000000, montant_engage:        0, montant_paye:       0, etape:'saf',       soumis:'02/02/2026' },
  { id:'DOS-2026-0005', type:'FOR-M', objet:'Formation cascade 80 paramédicaux délégation tâches', service:'SPSAC', porteur:'Chef SPSAC', ligne:'L-SPSAC-016',source:'PSLSH-035', montant_estime: 35000000, montant_engage:        0, montant_paye:       0, etape:'saf',       soumis:'05/02/2026' },
  { id:'DOS-2026-0006', type:'ACH-S', objet:'Carburant véhicules et groupe électrogène',          service:'SAF',   porteur:'Resp. SAF',  ligne:'L-SAF-044',  source:'PSLSH-035', montant_estime: 25000000, montant_engage: 6250000, montant_paye:       0, etape:'rejete',   soumis:'10/02/2026' },
  { id:'DOS-2026-0007', type:'ACH-P', objet:'Tests combinés VIH/Syphilis Dual RDT',                service:'APMS',  porteur:'Chef APMS',  ligne:'L-APMS-033', source:'PSLSH-033', montant_estime: 33000000, montant_engage:        0, montant_paye:       0, etape:'compta',    soumis:'15/02/2026' },
  { id:'DOS-2026-0008', type:'ACH-P', objet:'Construction entrepôt stockage intrants APMS',        service:'APMS',  porteur:'Chef APMS',  ligne:'L-APMS-031', source:'PSLSH-034', montant_estime: 35000000, montant_engage:        0, montant_paye:       0, etape:'saf',       soumis:'20/02/2026' },
  { id:'DOS-2026-0009', type:'PER-A', objet:'Primes performance équipe coordination Q1 2026',      service:'COORD', porteur:'Coordo',     ligne:'L-COORD-PRI',source:'PSLSH-035', montant_estime: 12500000, montant_engage:12500000, montant_paye:12500000, etape:'clos',      soumis:'25/02/2026' },
  { id:'DOS-2026-0010', type:'FOR-M', objet:'Atelier régional PEC pédiatrique Abéché',             service:'SPCH',  porteur:'Chef SPCH',  ligne:'L-SPCH-ATL', source:'PSLSH-035', montant_estime:  8500000, montant_engage: 8500000, montant_paye: 5950000, etape:'paiement', soumis:'01/03/2026' },
  { id:'DOS-2026-0011', type:'PER-A', objet:'Indemnités mission terrain auditeurs externes',       service:'SAF',   porteur:'Resp. SAF',  ligne:'L-SAF-MIS',  source:'PSLSH-035', montant_estime:  4200000, montant_engage:        0, montant_paye:       0, etape:'compta',    soumis:'05/03/2026' },
  { id:'DOS-2026-0012', type:'PER-A', objet:'Don matériel informatique Pasteur — partenariat',     service:'COORD', porteur:'Coordo',     ligne:'L-COORD-DON',source:'PSLSH-035', montant_estime:  9800000, montant_engage:        0, montant_paye:       0, etape:'brouillon', soumis:'08/03/2026' },
  { id:'DOS-2026-0013', type:'FOR-M', objet:'Séminaire annuel coordonnateurs régionaux',           service:'COORD', porteur:'Coordo',     ligne:'L-COORD-SEM',source:'PSLSH-035', montant_estime: 18500000, montant_engage:        0, montant_paye:       0, etape:'coordo',    soumis:'12/03/2026' },
];

let _dossiers = [];
let _currentType = '';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    _dossiers = raw ? JSON.parse(raw) : DEFAULT_DOSSIERS;
    if (!Array.isArray(_dossiers) || !_dossiers.length) _dossiers = DEFAULT_DOSSIERS;
  } catch (_) { _dossiers = DEFAULT_DOSSIERS; }
  if (!localStorage.getItem(STORAGE_KEY)) save();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(_dossiers)); }

function fmt(n) { return Math.round(n).toLocaleString('fr-FR'); }

function familyOf(code) { return FAMILIES.find((f) => f.code === code) || FAMILIES[0]; }

const WORKFLOW = ['brouillon', 'saf', 'compta', 'coordo', 'engagement', 'reception', 'paiement', 'clos'];

const ETAPE_META = {
  brouillon:  { cls:'e-brouillon',  label:'Brouillon',         actor:'Porteur du besoin' },
  saf:        { cls:'e-saf',        label:'Conformité admin.', actor:'SAF' },
  compta:     { cls:'e-compta',     label:'Vérif. budgétaire', actor:'Comptable' },
  coordo:     { cls:'e-coordo',     label:'Ordonnancement',    actor:'Coordonnateur' },
  engagement: { cls:'e-engagement', label:'Engagement',        actor:'SAF + Fournisseur' },
  reception:  { cls:'e-reception',  label:'Réception',         actor:'Magasinier' },
  paiement:   { cls:'e-paiement',   label:'Paiement',          actor:'Trésorier' },
  clos:       { cls:'e-clos',       label:'Clôturé',           actor:'—' },
  rejete:     { cls:'e-rejete',     label:'Rejeté',            actor:'—' },
};

function etapePill(etape) {
  const m = ETAPE_META[etape] || ETAPE_META.brouillon;
  return `<span class="etape-pill ${m.cls}">${m.label}</span>`;
}

function positionWidget(etape) {
  if (etape === 'rejete') {
    return `<div class="pos-cell">
      <div class="pos-stages">${WORKFLOW.slice(1).map(() => `<div class="pos-node rejected"></div>`).join('')}</div>
      <div class="pos-meta"><strong style="color:#b91c1c">Rejeté</strong><span class="pos-actor rejected">circuit clos</span></div>
    </div>`;
  }
  const stages = WORKFLOW.slice(1);
  const idx = stages.indexOf(etape);
  const isClos = etape === 'clos';
  const nodes = stages.map((s, i) => {
    const cls = isClos ? 'done' : i < idx ? 'done' : i === idx ? 'current' : '';
    return `<div class="pos-node ${cls}" title="${ETAPE_META[s].label}"></div>`;
  }).join('');
  const m = ETAPE_META[etape] || ETAPE_META.brouillon;
  const stepNum = isClos ? stages.length : idx + 1;
  const actorCls = isClos ? 'done' : '';
  return `<div class="pos-cell">
    <div class="pos-stages">${nodes}</div>
    <div class="pos-meta">
      <span><strong>${stepNum}/${stages.length}</strong> · ${m.label}</span>
      <span class="pos-actor ${actorCls}">${isClos ? '✓ terminé' : '→ ' + m.actor}</span>
    </div>
  </div>`;
}

function filterDossiers() {
  const q  = (document.getElementById('fSearch').value || '').toLowerCase();
  const fE = document.getElementById('fEtape').value;
  const fS = document.getElementById('fService').value;
  return _dossiers.filter((d) => {
    if (_currentType && d.type !== _currentType) return false;
    if (fE && d.etape !== fE) return false;
    if (fS && d.service !== fS) return false;
    if (q && !(d.id.toLowerCase().includes(q) || d.objet.toLowerCase().includes(q) || (d.porteur || '').toLowerCase().includes(q))) return false;
    return true;
  });
}

function renderTabs() {
  const html = FAMILIES.map((f) => {
    const n = f.code ? _dossiers.filter((d) => d.type === f.code).length : _dossiers.length;
    const active = f.code === _currentType ? ' active' : '';
    return `<div class="sheet-tab${active}" onclick="switchTab('${f.code}')" title="${f.label}">
      <i class="fas ${f.icon}" style="color:${f.color}"></i>
      ${f.label}
      <span class="count">${n}</span>
    </div>`;
  }).join('');
  document.getElementById('sheetTabs').innerHTML = html + `
    <div class="sheet-tabs-actions">
      <button class="sheet-nav-btn" title="Onglet précédent" onclick="navTab(-1)">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="sheet-nav-btn" title="Onglet suivant" onclick="navTab(1)">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>`;
}

function renderTable(list) {
  if (!list.length) {
    document.getElementById('dossierTable').innerHTML =
      `<div class="empty"><i class="fas fa-inbox d-block"></i>Aucun dossier ne correspond à ce filtre.</div>`;
    return;
  }
  const rows = list.map((d) => {
    const f = familyOf(d.type);
    return `<tr onclick="ouvrirDossier('${d.id}')">
      <td class="mono">${d.id}</td>
      <td><span class="badge-type bt-${d.type}"><i class="fas ${f.icon}"></i> ${f.label.split(' ')[0]}</span></td>
      <td><strong>${d.objet}</strong><br><small style="color:#94a3b8">${d.service} · ${d.porteur}</small></td>
      <td><span class="mono" style="color:#475569">${d.ligne}</span><br><small style="color:#94a3b8">${d.source}</small></td>
      <td class="num"><strong>${fmt(d.montant_estime)}</strong></td>
      <td class="num" style="color:#1d4ed8">${fmt(d.montant_engage)}</td>
      <td class="num" style="color:#15803d">${fmt(d.montant_paye)}</td>
      <td>${positionWidget(d.etape)}</td>
      <td style="color:#64748b;font-size:.72rem">${d.soumis}</td>
    </tr>`;
  }).join('');
  document.getElementById('dossierTable').innerHTML = `
    <table class="dos-tbl">
      <thead>
        <tr>
          <th style="width:120px">N° dossier</th>
          <th style="width:140px">Famille</th>
          <th>Objet</th>
          <th style="width:160px">Ligne / Source</th>
          <th class="num" style="width:120px">Estimé (FCFA)</th>
          <th class="num" style="width:120px">Engagé</th>
          <th class="num" style="width:120px">Payé</th>
          <th style="width:220px">Position dans le circuit</th>
          <th style="width:100px">Soumis</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function render() {
  const list = filterDossiers();
  renderTable(list);
  renderTabs();
  const fam = familyOf(_currentType);
  document.getElementById('paneTitle').innerHTML =
    `<i class="fas ${fam.icon} me-2" style="color:${fam.color}"></i>${fam.label}`;
  document.getElementById('bcTitle').textContent = fam.label;
  const n = list.length;
  document.getElementById('paneSub').textContent = `${n} dossier${n > 1 ? 's' : ''} · exercice 2026`;
}

function switchTab(code) {
  _currentType = code;
  const url = new URL(window.location);
  if (code) url.searchParams.set('type', code); else url.searchParams.delete('type');
  window.history.replaceState({}, '', url);
  render();
}

function navTab(dir) {
  const idx = FAMILIES.findIndex((f) => f.code === _currentType);
  const next = (idx + dir + FAMILIES.length) % FAMILIES.length;
  switchTab(FAMILIES[next].code);
}

function ouvrirDossier(id) {
  window.location.href = 'detail.html?id=' + encodeURIComponent(id);
}

function initServiceSelect() {
  const sel = document.getElementById('fService');
  sel.innerHTML = '<option value="">Tous services</option>' +
    SERVICES.map((s) => `<option value="${s}">${s}</option>`).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  load();
  const params = new URLSearchParams(window.location.search);
  _currentType = params.get('type') || '';
  initServiceSelect();
  render();
});
</script>
</body>
</html>
